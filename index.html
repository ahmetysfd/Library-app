                  onRemove={(it)=>onRemoveItem(library,it)}
                  onMoveToWatchlist={(it)=>onMoveStatus(library,it,it.status==='wishlist'?'collected':'wishlist')}
                  onMarkWatching={isFilms && tab==='shows' ? (it)=>onMoveStatus(library,it,'in_progress') : undefined}
                />
              </div>
            </div>
          ))}
        </div>
      ) : null}

      {/* ── Currently Watching section (Shows tab only, moved to bottom) ───── */}
      {isFilms && tab==='shows' && currentlyWatchingShows.length > 0 && (
        <div className="cw-section">
          <div className="cw-section-header">
            <span className="cw-section-title">
              <span className="cw-live-dot"/>
              Currently Watching
            </span>
            <span className="cw-section-count">{currentlyWatchingShows.length} show{currentlyWatchingShows.length!==1?'s':''}</span>
          </div>
          <div className="cw-cards-row">
            {currentlyWatchingShows.map((item,i)=>(
              <div key={item.ext_id||item.id||i} className="cw-card" style={{animationDelay:`${i*0.04}s`,animation:'fadeUp .3s ease both'}}>
                <div style={{cursor:'pointer',position:'relative'}} onClick={()=>setRatingItem(item)}>
                  <Cover src={item.cover_url} alt={item.title} w="100%" h={null} cls="film-wrap" style={{aspectRatio:'2/3',height:'auto'}}/>
                  {(()=>{
                    const rating = getDisplayRating(item);
                    return (
                      <span className="lib-grid-card-rating">
                        <SmallIcon type={rating.empty ? "star-outline" : "star"} size={17}/>
                        {rating.value}
                      </span>
                    );
                  })()}
                </div>
                <div className="cw-card-info-row">
                  <div className="cw-card-info-left" onClick={()=>setRatingItem(item)}>
                    <div className="cw-card-title">{item.title}</div>
                    <div className="cw-card-sub">{item.subtitle}</div>
                  </div>
                  <CardMenu
                    item={item}
                    onRemove={(it)=>onRemoveItem(library,it)}
                    onMoveToWatchlist={(it)=>onMoveStatus(library,it,'wishlist')}
                    onMarkWatched={(it)=>onMoveStatus(library,it,'collected')}
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {ratingItem && (
        <RatingModal
          item={ratingItem}
          onRate={(item, val)=>onRateItem(library, item, val)}
          onDelete={(item)=>{ onRemoveItem(library, item); }}
          onClose={()=>setRatingItem(null)}
        />
      )}
    </div>
  );
}

/*
 * IMDb Top 250 uses a Bayesian weighted rating formula:
 *   WR = (v / (v + m)) × R + (m / (v + m)) × C
 *
 * IMDb uses m=25,000 but they have ~100x more voters than TMDB.
 * TMDB's vote counts are much smaller — a blockbuster might have
 * 15K-30K votes on TMDB vs 2M+ on IMDb.
 * We use m=8,000 which is the equivalent threshold for TMDB's scale.
 * This still filters out niche/obscure films while keeping the
 * list populated with well-known, broadly-rated movies.
 */

const BAYESIAN_M = 8000;   // minimum votes threshold (scaled for TMDB)
const BAYESIAN_C = 6.4;    // TMDB's approximate global mean rating

function bayesianRating(voteAvg, voteCount) {
  const v = voteCount || 0;
  const R = voteAvg || 0;
  return (v / (v + BAYESIAN_M)) * R + (BAYESIAN_M / (v + BAYESIAN_M)) * BAYESIAN_C;
}

async function fetchTop300(page=1) {
  if (!TMDB_KEY || location.protocol === 'file:') return demoTop300(page);
  try {
    // Use discover endpoint with minimum 8k votes — IMDb-style Bayesian approach scaled for TMDB
    const r = await fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&language=en-US&sort_by=vote_average.desc&vote_count.gte=8000&page=${page}`);
    const d = await r.json();
    if (!r.ok) return demoTop300(page);
    return (d.results||[]).map((x,i)=>{
      const wr = bayesianRating(x.vote_average, x.vote_count);
      return {
        ext_id:String(x.id), title:x.title||x.name,
        subtitle:(x.release_date||'').slice(0,4),
        cover_url: x.poster_path ? TMDB_IMG+x.poster_path : '',
        metadata:{vote_average:x.vote_average, vote_count:x.vote_count, weighted_rating:wr, media_type:'movie'},
        rank: (page-1)*20 + i + 1,
        weighted_rating: wr
      };
    });
  } catch { return demoTop300(page); }
}

function Top300Page({ onBack, onAddToLibrary, libraryItems }) {
  const [movies, setMovies] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState(1);
  const [loadingMore, setLoadingMore] = useState(false);
  const maxPages = 15; // 15 pages × 20 = 300

  const existingIds = useMemo(()=> new Set((libraryItems||[]).map(i=>i.ext_id)),[libraryItems]);
  const watchedCount = movies.filter(m=>existingIds.has(m.ext_id)).length;

  useEffect(()=>{
    setLoading(true);
    fetchTop300(1).then(data=>{setMovies(data);setLoading(false);});
  },[]);

  const loadMore = async ()=>{
    if (page >= maxPages) return;
    setLoadingMore(true);
    const next = page + 1;
    const data = await fetchTop300(next);
    setMovies(prev=>[...prev,...data]);
    setPage(next);
    setLoadingMore(false);
  };

  return (
    <div className="top300-page">
      <div className="top300-header">
        <div style={{display:'flex',alignItems:'baseline'}}>
          <div className="top300-title">Top Rated Movies</div>
          <span className="top300-sub">Bayesian weighted · 8K+ votes minimum</span>
        </div>
      </div>

      <div className="top300-progress">
        <div className="top300-progress-bar">
          <div className="top300-progress-fill" style={{width:`${(watchedCount/Math.max(movies.length,1))*100}%`}}/>
        </div>
        <div className="top300-progress-text">
          <span>{watchedCount} of {movies.length} watched</span>
          <span>{Math.round((watchedCount/Math.max(movies.length,1))*100)}%</span>
        </div>
      </div>

      {loading ? (
        <div className="loading-dots" style={{padding:60}}><span/><span/><span/></div>
      ) : (
        <>
          <div className="top300-grid">
            {movies.map((movie,i)=>{
              const inLib = existingIds.has(movie.ext_id);
              return (
                <div key={movie.ext_id+'-'+i} className="top300-item" style={{animationDelay:`${(i%20)*0.03}s`}}>
                  <div className="top300-rank">#{movie.rank}</div>
                  {inLib
                    ? <div className="top300-added" title="In your library">✓</div>
                    : <button className="top300-add-btn" title="Add to library" onClick={(e)=>{e.stopPropagation();onAddToLibrary(movie);}}>+</button>
                  }
                  <div className="top300-poster">
                    <img src={movie.cover_url} alt={movie.title} loading="lazy" onError={e=>{e.target.style.visibility='hidden'}}/>
                  </div>
                  <div className="top300-info">
                    <div className="top300-name">{movie.title}</div>
                    <div className="top300-meta">
                      <span>{movie.subtitle}</span>
                      {movie.metadata?.vote_average && (
                        <span className="top300-rating">
                          <svg viewBox="0 0 12 12" fill="none"><path d="M6 1l1.5 3 3.5.5-2.5 2.4.6 3.5L6 8.8 2.9 10.4l.6-3.5L1 4.5 4.5 4z" fill="#c9a55a"/></svg>
                          {movie.metadata.vote_average.toFixed?.(1)||movie.metadata.vote_average}
                        </span>
                      )}
                      {movie.metadata?.vote_count && (
                        <span style={{fontSize:'10px',color:'var(--text4)'}}>
                          ({movie.metadata.vote_count >= 1000000 ? (movie.metadata.vote_count/1000000).toFixed(1)+'M' : movie.metadata.vote_count >= 1000 ? (movie.metadata.vote_count/1000).toFixed(0)+'K' : movie.metadata.vote_count})
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {page < maxPages && (
            <div className="top300-load-more">
              <button className="top300-load-btn" onClick={loadMore} disabled={loadingMore}>
                {loadingMore ? 'Loading…' : `Load more (${movies.length}/300)`}
              </button>
            </div>
          )}
        </>
      )}

/*
 * DATA SOURCE: MusicBrainz API (free, no key needed)
 * - Album search: /ws/2/release/?query=release:TITLE+AND+artist:ARTIST&limit=1&fmt=json
 * - Cover art: Cover Art Archive → https://coverartarchive.org/release/{mbid}/front-250
 * 
 * HOW IT WORKS:
 * 1. We maintain a curated list of 300 greatest-selling album titles + artists
 * 2. On page load, we search MusicBrainz for each album in batches of 20
 * 3. MusicBrainz returns the real release MBID (MusicBrainz ID)
 * 4. We construct cover art URLs from those real MBIDs
 * 5. Results are cached in memory so repeated visits don't re-fetch
 *
 * SCALABILITY:
 * - In production, move this to your Express server (server.js) as /api/top-albums
 * - Cache MusicBrainz responses in Redis/Supabase (covers rarely change)
 * - Rate limit: MusicBrainz allows 1 req/sec — we throttle with 1s delays
 * - The curated list lives in the database, editable via admin panel
 * - User libraries are stored in Supabase with full RLS (see schema.sql)
 */

// Search MusicBrainz for a single album to get cover URL
async function searchAlbumCover(title, artist) {
  try {
    const q = encodeURIComponent(`release:${title} AND artist:${artist}`);
    const r = await fetch(`https://musicbrainz.org/ws/2/release/?query=${q}&limit=1&fmt=json`, {
      headers:{'User-Agent':'ShelfApp/2.0 (https://shelf.app)'}
    });
    const d = await r.json();
    const rel = (d.releases||[])[0];
    if (rel) return { id:rel.id, cover:`https://coverartarchive.org/release/${rel.id}/front-250` };
  } catch {}
  return null;
}

// Cache for fetched covers
const albumCoverCache = {};

function TopAlbumsPage({ onBack, onAddToLibrary, libraryItems }) {
  const [page, setPage] = useState(1);
  const [covers, setCovers] = useState({});
  const [loadingCovers, setLoadingCovers] = useState(false);
  const [genreFilter, setGenreFilter] = useState('All');
  const perPage = 20;

  const filteredAlbums = useMemo(()=>{
    if (genreFilter === 'All') return GREATEST_ALBUMS;
    return GREATEST_ALBUMS.filter(a=>a.genre===genreFilter);
  },[genreFilter]);

  const maxPages = Math.ceil(filteredAlbums.length / perPage);
  const visibleAlbums = filteredAlbums.slice(0, page * perPage);

  const existingTitles = useMemo(()=> new Set((libraryItems||[]).map(i=>i.title)),[libraryItems]);

  // Genre counts
  const genreCounts = useMemo(()=>{
    const c = {};
    GREATEST_ALBUMS.forEach(a=>{ c[a.genre] = (c[a.genre]||0)+1; });
    return c;
  },[]);

  // Reset page when genre changes
  useEffect(()=>setPage(1),[genreFilter]);

  // Fetch covers for visible albums
  useEffect(()=>{
    let cancelled = false;
    const fetchBatch = async ()=>{
      const toFetch = visibleAlbums.filter(a=>!covers[a.rank] && !albumCoverCache[a.rank]);
      if (!toFetch.length) return;
      setLoadingCovers(true);
      for (const album of toFetch) {
        if (cancelled) break;
        if (albumCoverCache[album.rank]) { setCovers(p=>({...p,[album.rank]:albumCoverCache[album.rank]})); continue; }
        const result = await searchAlbumCover(album.title, album.artist);
        if (result) {
          albumCoverCache[album.rank] = result.cover;
          if (!cancelled) setCovers(p=>({...p,[album.rank]:result.cover}));
        }
        // MusicBrainz rate limit: 1 req/sec
        await new Promise(r=>setTimeout(r,1100));
      }
      if (!cancelled) setLoadingCovers(false);
    };
    fetchBatch();
    return ()=>{cancelled=true;};
  },[visibleAlbums.length]);

  const loadMore = ()=>{ if(page<maxPages) setPage(p=>p+1); };

  return (
    <div className="top300-page">
      <div className="top300-header">
        <div style={{display:'flex',alignItems:'baseline'}}>
          <div className="top300-title">Greatest Albums of All Time</div>
          <span className="top300-sub">{filteredAlbums.length} albums{genreFilter!=='All'?` · ${genreFilter}`:' · Best-selling & critically acclaimed'}</span>
        </div>
      </div>

      <div className="album-genre-tabs">
        {ALBUM_GENRES.map(g=>{
          const count = g==='All' ? GREATEST_ALBUMS.length : (genreCounts[g]||0);
          if (g!=='All' && !count) return null;
          return (
            <button key={g} className={`album-genre-tab ${genreFilter===g?'active':''}`} onClick={()=>setGenreFilter(g)}>
              {g}<span className="album-genre-count">{count}</span>
            </button>
          );
        })}
      </div>

      <div className="top300-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(148px,1fr))'}}>
        {visibleAlbums.map((album,i)=>{
          const inLib = existingTitles.has(album.title);
          const coverUrl = covers[album.rank] || albumCoverCache[album.rank] || '';
          return (
            <div key={album.rank} className="top300-item" style={{animationDelay:`${(i%20)*0.03}s`}}>
              <div className="top300-rank">#{album.rank}</div>
              {inLib
                ? <div className="top300-added" title="In your library">✓</div>
                : <button className="top300-add-btn" title="Add to library" onClick={(e)=>{
                    e.stopPropagation();
                    onAddToLibrary({ext_id:'album-'+album.rank,title:album.title,subtitle:album.artist,cover_url:coverUrl,metadata:{year:album.year}});
                  }}>+</button>
              }
              <div className="top300-poster" style={{aspectRatio:'1'}}>
                {coverUrl
                  ? <img src={coverUrl} alt={album.title} loading="lazy" onError={e=>{e.target.style.display='none';e.target.nextSibling&&(e.target.nextSibling.style.display='flex');}}/>
                  : null}
                <div style={{display:coverUrl?'none':'flex',width:'100%',height:'100%',alignItems:'center',justifyContent:'center',background:'var(--bg3)',flexDirection:'column',gap:4,padding:8}}>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:'var(--gold-dim)',opacity:.4}}>♫</span>
                  <span style={{fontSize:9,color:'var(--text4)',textAlign:'center',lineHeight:1.2}}>{album.title.slice(0,20)}</span>
                </div>
              </div>
              <div className="top300-info">
                <div className="top300-name">{album.title}</div>
                <div className="top300-meta">
                  <span>{album.artist}</span>
                  <span style={{color:'var(--text4)'}}>{album.year}</span>
                  {genreFilter==='All' && <span style={{color:'var(--gold-dim)',fontSize:10}}>{album.genre}</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {loadingCovers && <div style={{textAlign:'center',padding:'16px 0',fontSize:11,color:'var(--text4)',letterSpacing:'.1em'}}>Loading covers from MusicBrainz…</div>}

      {page < maxPages && (
        <div className="top300-load-more">
          <button className="top300-load-btn" onClick={loadMore}>
            Load more ({visibleAlbums.length}/{filteredAlbums.length})
          </button>
        </div>
      )}
    </div>
  );
}

/* ─── Browse Albums — Spotify (server cache) + iTunes (fallback) ────────────
 *
 * PRODUCTION ARCHITECTURE:
 * 1. Frontend calls YOUR server: /api/albums/browse?genre=rock
 * 2. Server checks Supabase cached_albums table
 * 3. Cache hit → instant response (0 Spotify calls)
 * 4. Cache miss → server fetches from Spotify → caches → responds
 * 5. 50 users, 10,000 users → same ~0 Spotify API calls
 *
 * FALLBACK (no server running):
 * Uses iTunes Search API directly from client (free, no auth)
 *
 * DATA STORAGE:
 * cached_albums table stores only CDN URLs (not images)
 * 1 million albums × ~500 bytes/row = ~500MB in Supabase
 * Images live on Spotify/Apple CDN forever — you never download them
 * ──────────────────────────────────────────────────────────────────────── */

const ALBUM_BROWSE_GENRES = [
  {id:'all',label:'All'},
  {id:'rock',label:'Rock'},
  {id:'hip-hop',label:'Hip Hop'},
  {id:'pop',label:'Pop'},
  {id:'rnb',label:'R&B'},
  {id:'electronic',label:'Electronic'},
  {id:'metal',label:'Metal'},
  {id:'jazz',label:'Jazz'},
  {id:'country',label:'Country'},
];

// Years from 2026 down to 1950
const BROWSE_YEARS = [null, ...Array.from({length:2026-1950+1}, (_,i) => 2026-i)];

// Fetch from your server (Supabase cache — Last.fm for all-time, MusicBrainz for year-specific)
async function fetchAlbumsFromServer(genreId, page, year) {
  try {
    let url = `${API_BASE}/api/albums/browse?genre=${genreId}&page=${page}&limit=100`;
    if (year) url += `&year=${year}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const d = await r.json();
    if (d.albums && d.albums.length > 0) {
      return {
        albums: d.albums.map(a => ({
          ext_id: a.id, title: a.title, artist: a.artist, year: String(a.year||''),
          cover: a.cover_url, genre: a.genre, popularity: a.popularity,
        })),
        source: d.source || 'cache',
        total: d.total || d.albums.length,
      };
    }
    return { albums: [], source: d.source || 'empty', total: 0 };
  } catch { return null; }
}

// Fallback: iTunes API — strictly albums only, no singles
async function fetchAlbumsFromItunes(term, year, limit=200) {
  try {
    let searchTerm = term + ' album';
    if (year) searchTerm += ' ' + year;
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&entity=album&limit=${limit}&country=US`;
    const r = await fetch(url);
    const d = await r.json();
    return (d.results||[])
      .filter(a => {
        const name = (a.collectionName||'').toLowerCase();
        if (name.includes('- single') || name.includes('- ep') || name.endsWith(' ep')) return false;
        if (a.trackCount && a.trackCount < 5) return false;
        if (a.collectionType && a.collectionType !== 'Album') return false;
        if (year) {
          const ry = a.releaseDate ? parseInt(a.releaseDate.slice(0,4)) : 0;
          if (ry !== year) return false;
        }
        return true;
      })
      .map(a => ({
        ext_id: String(a.collectionId), title: a.collectionName||'', artist: a.artistName||'',
        year: a.releaseDate ? a.releaseDate.slice(0,4) : '',
        cover: (a.artworkUrl100||'').replace('100x100', '300x300'),
        genre: a.primaryGenreName||'', popularity: 0,
      }));
  } catch { return []; }
}

function BrowseAlbumsPage({ onAddToLibrary, libraryItems }) {
  const [genre, setGenre] = useState(ALBUM_BROWSE_GENRES[0]);
  const [yearFilter, setYearFilter] = useState(null);
  const [albums, setAlbums] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState(1);
  const [hasMore, setHasMore] = useState(true);
  const [loadingMore, setLoadingMore] = useState(false);
  const [source, setSource] = useState('');
  const existingTitles = useMemo(()=>new Set((libraryItems||[]).map(i=>i.title)),[libraryItems]);

  const fetchPage = async (g, year, p, append) => {
    if (!append) setLoading(true); else setLoadingMore(true);

    // 1. Try server (Last.fm cache for all-time, MusicBrainz for year-specific)
    const serverResult = await fetchAlbumsFromServer(g.id, p, year);
    let data = serverResult?.albums || [];
    let src = serverResult?.source || 'none';

    // 2. Fallback to iTunes ONLY if server returned nothing
    if (data.length === 0) {
      data = await fetchAlbumsFromItunes(g.label, year);
      src = 'itunes';
    }

    // Deduplicate
    const seen = append ? new Set(albums.map(a=>(a.title+a.artist).toLowerCase())) : new Set();
    const unique = (data||[]).filter(a => {
      const k = (a.title+a.artist).toLowerCase();
      if (seen.has(k) || !a.title) return false;
      seen.add(k);
      return true;
    });

    if (append) setAlbums(prev => [...prev, ...unique]);
    else setAlbums(unique);
    setSource(src);
    setHasMore(unique.length >= 30);
    setLoading(false); setLoadingMore(false);
  };

  useEffect(()=>{ setPage(1); fetchPage(genre, yearFilter, 1, false); },[genre, yearFilter]);

  const loadMore = ()=>{ const np=page+1; setPage(np); fetchPage(genre, yearFilter, np, true); };

  return (
    <div className="top300-page">
      <div className="top300-header">
        <div style={{display:'flex',alignItems:'baseline',flexWrap:'wrap',gap:'4px 0'}}>
          <div className="top300-title">Browse Albums</div>
          <span className="top300-sub">
            {albums.length} albums
            {genre.id!=='all'?' · '+genre.label:''}
            {yearFilter?' · '+yearFilter:''}
            {' · '}{source==='cache'?'Last.fm listeners':'iTunes fallback'}
          </span>
        </div>
      </div>

      {/* Genre tabs */}
      <div className="tmdb-genre-tabs">
        {ALBUM_BROWSE_GENRES.map(g=>(
          <button key={g.id} className={'tmdb-genre-tab '+(genre.id===g.id?'active':'')} onClick={()=>setGenre(g)}>{g.label}</button>
        ))}
      </div>

      {/* Year dropdown */}
      <div className="browse-filters">
        <span className="browse-filter-label">Year</span>
        <select
          className="browse-year-select"
          value={yearFilter || ''}
          onChange={e => setYearFilter(e.target.value ? parseInt(e.target.value) : null)}
        >
          <option value="">All Time</option>
          {BROWSE_YEARS.filter(Boolean).map(y => (
            <option key={y} value={y}>{y}</option>
          ))}
        </select>
      </div>

      {loading ? (
        <div style={{textAlign:'center',padding:'60px 0'}}>
          <div className="loading-dots"><span/><span/><span/></div>
          <div style={{fontSize:12,color:'var(--text4)',marginTop:14,letterSpacing:'.08em'}}>
            {yearFilter
              ? `Searching ${genre.label.toLowerCase()} albums from ${yearFilter}...`
              : `Loading top ${genre.label.toLowerCase()} albums...`}
          </div>
        </div>
      ) : albums.length === 0 ? (
        <div style={{textAlign:'center',padding:'60px 0',color:'var(--text3)',fontSize:14,lineHeight:1.8}}>
          No albums found{yearFilter?' for '+yearFilter:''}{genre.id!=='all'?' in '+genre.label:''}.<br/>
          <span style={{fontSize:12,color:'var(--text4)'}}>
            {yearFilter ? 'Run: POST /api/albums/seed-years to populate year data.' : 'Run: POST /api/albums/seed-all to populate genre data.'}
          </span>
        </div>
      ) : (
        <>
          <div className="top300-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(148px,1fr))'}}>
            {albums.map((a,i)=>{
              const inLib = existingTitles.has(a.title);
              return (
                <div key={a.ext_id+'-'+i} className="top300-item" style={{animationDelay:((i%30)*0.02)+'s'}}>
                  {inLib ? <div className="top300-added" title="In library">{'\u2713'}</div>
                    : <button className="top300-add-btn" title="Add to library" onClick={e=>{
                        e.stopPropagation();
                        onAddToLibrary({ext_id:a.ext_id,title:a.title,subtitle:a.artist,cover_url:a.cover,metadata:{year:a.year,genre:a.genre}});
                      }}>+</button>}
                  <div className="top300-poster" style={{aspectRatio:'1'}}>
                    <img src={a.cover} alt={a.title} loading="lazy" onError={e=>{e.target.style.visibility='hidden'}}/>
                  </div>
                  <div className="top300-info">
                    <div className="top300-name">{a.title}</div>
                    <div className="top300-meta">
                      <span>{a.artist}</span>
                      <span style={{color:'var(--text4)'}}>{a.year}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {hasMore && (
            <div className="top300-load-more">
              <button className="top300-load-btn" onClick={loadMore} disabled={loadingMore}>
                {loadingMore ? 'Loading...' : 'Load more albums'}
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

const ARTIST_GENRES = ['all','rock','hip-hop','pop','rnb','electronic','metal','indie','country','latin','k-pop','jazz'];
const artistGenreLabel = (g) => g === 'all' ? 'All genres' : g === 'rnb' ? 'R&B' : g === 'k-pop' ? 'K-Pop' : g.charAt(0).toUpperCase() + g.slice(1).replace('-', ' ');

function formatFollowers(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

async function fetchArtistAlbums(spotifyArtistId, market = 'US') {
  try {
    const r = await fetch(`${API_BASE}/api/artists/${encodeURIComponent(spotifyArtistId)}/albums?market=${encodeURIComponent(market)}`);
    const d = await r.json().catch(() => ({}));
    if (!r.ok) return { error: d.error || 'Failed to load artist albums', albums: [] };
    return { albums: d.albums || [] };
  } catch {
    return { error: 'Could not reach server', albums: [] };
  }
}

function ArtistAlbumsModal({ artist, libraryItems, onAddToLibrary, onClose }) {
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [albums, setAlbums] = useState([]);

  const existingAlbumIds = useMemo(
    () => new Set((libraryItems || []).map(i => String(i.ext_id || ''))),
    [libraryItems]
  );

  useEffect(() => {
    let canceled = false;
    (async () => {
      setLoading(true);
      const res = await fetchArtistAlbums(artist.id);
      if (canceled) return;
      if (res.error) setErr(res.error);
      setAlbums(res.albums || []);
      setLoading(false);
    })();
    return () => { canceled = true; };
  }, [artist.id]);

  const initials = (artist.name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

  const addAlbum = (al) => {
    const img = al.images || [];
    const cover = img[1]?.url || img[0]?.url || '';
    const subtitle = (al.artists || []).map(a => a.name).filter(Boolean).join(', ') || artist.name;
    onAddToLibrary?.({
      ext_id: `spotify-album-${al.id}`,
      title: al.name,
      subtitle,
      cover_url: cover,
      metadata: {
        kind: 'album',
        spotify_album_id: al.id,
        spotify_url: al.external_urls?.spotify || '',
        release_date: al.release_date || '',
        total_tracks: al.total_tracks || 0,
      }
    });
  };

  return (
    <div className="artist-albums-backdrop" onClick={(e)=>e.target===e.currentTarget&&onClose()}>
      <div className="artist-albums-modal" onClick={(e)=>e.stopPropagation()}>
        <div className="artist-albums-head">
          <div className="artist-albums-avatar">
            {artist.image_url
              ? <img src={artist.image_url} alt={artist.name} onError={e=>{e.target.style.display='none';}}/>
              : initials}
          </div>
          <div>
            <div className="artist-albums-title">{artist.name}</div>
            <div className="artist-albums-sub">
              {loading ? 'Loading albums from Spotify...' : `${albums.length} albums (no singles)`}
            </div>
          </div>
          <button className="artist-albums-close" onClick={onClose} aria-label="Close">×</button>
        </div>
        <div className="artist-albums-body">
          {err ? (
            <div style={{color:'#c07070',fontSize:13,padding:'12px 6px'}}>{err}</div>
          ) : loading ? (
            <div style={{textAlign:'center',padding:'40px 0'}}><div className="loading-dots"><span/><span/><span/></div></div>
          ) : albums.length === 0 ? (
            <div style={{textAlign:'center',padding:'26px',fontSize:13,color:'var(--text3)'}}>No albums found for this artist.</div>
          ) : (
            <div className="artist-albums-grid">
              {albums.map((al, i) => {
                const extId = `spotify-album-${al.id}`;
                const inLib = existingAlbumIds.has(extId);
                const img = al.images || [];
                const cover = img[1]?.url || img[0]?.url || '';
                return (
                  <div key={al.id || i} className="artist-album-item">
                    {inLib
                      ? <div className="artist-album-added">{'\u2713'}</div>
                      : <button className="artist-album-add" onClick={()=>addAlbum(al)}>+</button>}
                    <div className="artist-album-cover">
                      {cover ? <img src={cover} alt={al.name} loading="lazy" onError={e=>{e.target.style.visibility='hidden';}}/> : null}
                    </div>
                    <div className="artist-album-name">{al.name}</div>
                    <div className="artist-album-meta">{al.release_date || ''}{al.total_tracks ? ` · ${al.total_tracks} tracks` : ''}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                            kind: 'artist',
                            spotify_artist_id: a.id,
                            followers: a.followers || 0,

const GAME_META = {

  'g2':{genres:['RPG','Action','Open World'],studios:['CD Projekt']},
  'g3':{genres:['Sandbox','Survival'],studios:['Mojang']},
  'g4':{genres:['Action','Adventure','Open World'],studios:['Rockstar']},
  'g5':{genres:['RPG','Open World'],studios:['CD Projekt']},
  'g6':{genres:['RPG','Action'],studios:['FromSoftware']},
};

function getItemMeta(item, libType) {
  if (libType==='films') return FILM_META[item.ext_id] || {genres:['Drama'],directors:['Unknown'],actors:['Unknown']};
  if (libType==='games') return GAME_META[item.ext_id] || {genres:['Action'],studios:['Unknown']};
  if (libType==='books') return {genres:['Fiction'],authors:[item.subtitle||'Unknown']};
  if (libType==='music') return {genres:['Rock'],artists:[item.subtitle||'Unknown']};
  return {};
}

function computeInsights(library) {
  const items = library?.items || [];
  if (items.length === 0) return null;
  const type = library.type;

  // Genre frequency
  const genreMap = {};
  const personMap = {}; // directors for films, studios for games, etc.
  const actorMap = {};
  const directorFilms = {}; // director → [items]
  const ratings = [];
  let movieCount = 0;
  let showCount = 0;

  items.forEach(item => {
    const meta = getItemMeta(item, type);
    (meta.genres||[]).forEach(g => { genreMap[g] = (genreMap[g]||0)+1; });

    // Count movies vs shows
    if (type==='films') {
      if (item.metadata?.media_type==='tv') showCount++;
      else movieCount++;
      (meta.directors||[]).forEach(d => {
        personMap[d] = (personMap[d]||0)+1;
        if (!directorFilms[d]) directorFilms[d] = [];
        directorFilms[d].push(item);
      });
      (meta.actors||[]).forEach(a => { actorMap[a] = (actorMap[a]||0)+1; });
    } else if (type==='games') {
      (meta.studios||[]).forEach(s => { personMap[s] = (personMap[s]||0)+1; });
    } else if (type==='books') {
      (meta.authors||[]).forEach(a => { personMap[a] = (personMap[a]||0)+1; });
    } else if (type==='music') {
      (meta.artists||[]).forEach(a => { personMap[a] = (personMap[a]||0)+1; });
    }

    const r = item.user_rating || item.metadata?.vote_average || item.metadata?.rating;
    if (r) ratings.push(r);
  });

  const sortDesc = obj => Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  const genres = sortDesc(genreMap).slice(0,6);
  const topPeople = sortDesc(personMap).slice(0,5);
  const topActors = sortDesc(actorMap).slice(0,5);
  const avgRating = ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length) : 0;
  const watched = items.filter(i=>i.status!=='wishlist').length;
  const watchlist = items.filter(i=>i.status==='wishlist').length;

  // Rating histogram (1-10 buckets)
  const histogram = Array(10).fill(0);
  ratings.forEach(r => { const bucket = Math.min(9, Math.floor(r)-1); if(bucket>=0) histogram[bucket]++; });

  const artistCount = Object.keys(personMap).filter(k=>k!=='Unknown').length;

  return { genres, topPeople, topActors, avgRating, watched, watchlist, total:items.length, histogram, ratings, directorFilms, movieCount, showCount, artistCount };
}

// Get top 3 directors with their best film
function getTopDirectors(library, insights) {
  if (!insights || !insights.topPeople.length) return [];
  return insights.topPeople
    .filter(([name]) => name !== 'Unknown')
    .slice(0, 4)
    .map(([name, count]) => {
      const films = (insights.directorFilms[name] || []).sort((a, b) => {
        const ra = a.user_rating || a.metadata?.vote_average || 0;
        const rb = b.user_rating || b.metadata?.vote_average || 0;
        return rb - ra;
      });
      return { director: name, count, films: films.slice(0, 3) };
    })
    .filter(d => d.films.length > 0);
}

// Genre-specific dark colors — each represents its genre feel
const GENRE_PALETTE = {
  'Drama':     '#9a7e45',
  'Thriller':  '#6b7a42',
  'Sci-Fi':    '#b86e3a',
  'Action':    '#8c4040',
  'Crime':     '#5a5045',
  'History':   '#7a6a3a',
  'Fantasy':   '#6a4a6a',
  'Adventure': '#4a6a5a',
  'Mystery':   '#5a6070',
  'Comedy':    '#8a7a4a',
  'Horror':    '#5a3535',
  'Romance':   '#7a5050',
  'Animation': '#5a7a70',
  'War':       '#5a5a40',
  'Music':     '#6a5a7a',
  'RPG':       '#6a5040',
  'Open World':'#4a6050',
  'Sandbox':   '#7a7050',
  'Survival':  '#5a6040',
};
function getGenreColor(genre, idx) {
  return GENRE_PALETTE[genre] || ['#9a7e45','#6b7a42','#b86e3a','#8c4040','#5a5045','#7a6a3a','#6a4a6a','#4a6a5a'][idx%8];
}
function lightenColor(hex, amt) {
  const num = parseInt(hex.slice(1),16);
  const r = Math.min(255,(num>>16)+amt);
  const g = Math.min(255,((num>>8)&0xff)+amt);
  const b = Math.min(255,(num&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

// Combined donut + legend with shared hover state
function GenreDonutSection({ data }) {
  const [hovered, setHovered] = useState(null);
  const total = data.reduce((s,d)=>s+d[1],0);
  if(!total) return null;

  const size = 190;
  const cx = size/2, cy = size/2;
  const r = size/2 - 6;
  const ir = r * 0.62;
  const gap = 0.02;

  let cumAngle = -Math.PI/2;
  const segments = data.map(([label,count],i) => {
    const angle = Math.max(0, (count/total)*Math.PI*2 - gap);
    const startAngle = cumAngle + gap/2;
    const endAngle = startAngle + angle;
    cumAngle += (count/total)*Math.PI*2;

    const x1 = cx + r*Math.cos(startAngle), y1 = cy + r*Math.sin(startAngle);
    const x2 = cx + r*Math.cos(endAngle), y2 = cy + r*Math.sin(endAngle);
    const ix1 = cx + ir*Math.cos(endAngle), iy1 = cy + ir*Math.sin(endAngle);
    const ix2 = cx + ir*Math.cos(startAngle), iy2 = cy + ir*Math.sin(startAngle);
    const large = angle > Math.PI ? 1 : 0;
    const d = `M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${ix1},${iy1} A${ir},${ir} 0 ${large} 0 ${ix2},${iy2} Z`;

    const baseColor = getGenreColor(label, i);
    const isH = hovered === i;
    const isO = hovered !== null && hovered !== i;

    return (
      <path key={i} d={d}
        fill={isH ? lightenColor(baseColor, 50) : baseColor}
        opacity={isO ? 0.28 : 1}
        style={{transition:'fill .2s ease,opacity .25s ease',cursor:'pointer'}}
        onMouseEnter={()=>setHovered(i)}
        onMouseLeave={()=>setHovered(null)}
      />
    );
  });

  const centerLabel = hovered !== null ? data[hovered][0] : '';
  const centerCount = hovered !== null ? data[hovered][1] : total;
  const centerSub = hovered !== null ? '' : 'Total';

  return (
    <div className="ins-genre-donut">
      <div className="ins-genre-donut-title">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" style={{opacity:.5}}><path d="M2 14L5 8l3 4 3-7 3 5" stroke="var(--gold)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        Genre Distribution
      </div>
      <div className="ins-donut-wrap" onMouseLeave={()=>setHovered(null)}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {segments}
        </svg>
        <div className="ins-donut-center">
          <div className="ins-donut-center-count">{centerCount}</div>
          <div className="ins-donut-center-label">{centerLabel || centerSub}</div>
        </div>
      </div>
      <div className="ins-donut-legend">
        {data.map(([genre, count], i) => (
          <div key={genre}
            className={`ins-donut-legend-item ${hovered===i?'active':''} ${hovered!==null&&hovered!==i?'dimmed':''}`}
            onMouseEnter={()=>setHovered(i)}
            onMouseLeave={()=>setHovered(null)}>
            <span className="ins-donut-legend-dot" style={{background: hovered===i ? lightenColor(getGenreColor(genre,i),40) : getGenreColor(genre,i)}}/>
            <span className="ins-donut-legend-name">{genre}</span>
            <span className="ins-donut-legend-count">{count}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── Steam Import Modal ─────────────────────────────────────────────────── */
function SteamImportModal({ onClose, onImport }) {
  const [steamInput, setSteamInput] = useState('');
  const [games, setGames] = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [fetched, setFetched] = useState(false);

  const fetchLibrary = async () => {
    if (!steamInput.trim()) return;
    setLoading(true); setError(''); setGames([]); setSelected(new Set()); setFetched(false);

    try {
      let steamId = steamInput.trim();

      // If not a 17-digit number, try resolving as vanity URL
      if (!/^\d{17}$/.test(steamId)) {
        // Strip URL parts if user pasted full URL
        steamId = steamId.replace(/.*steamcommunity\.com\/(id|profiles)\//i, '').replace(/\//g, '');
        if (!/^\d{17}$/.test(steamId)) {
          const resolveRes = await fetch(`${API_BASE}/api/steam/resolve/${encodeURIComponent(steamId)}`);
          const resolveData = await resolveRes.json();
          if (resolveData.error) { setError(resolveData.error); setLoading(false); return; }
          steamId = resolveData.steamId;
        }
      }

      const res = await fetch(`${API_BASE}/api/steam/library/${steamId}`);
      const data = await res.json();

      if (data.error) { setError(data.error); setLoading(false); return; }
      if (!data.games || data.games.length === 0) {
        setError('No games found. Make sure the Steam profile is set to PUBLIC.');
        setLoading(false); return;
      }

      setGames(data.games);
      // Auto-select games with more than 1 hour playtime
      const autoSelect = new Set(data.games.filter(g => g.playtime_hours >= 1).map(g => g.ext_id));
      setSelected(autoSelect);
      setFetched(true);
    } catch (e) {
      setError('Failed to connect to server. Is it running?');
    }
    setLoading(false);
  };

  const toggleGame = (extId) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(extId)) next.delete(extId);
      else next.add(extId);
      return next;
    });
  };

  const selectAll = () => setSelected(new Set(games.map(g => g.ext_id)));
  const selectNone = () => setSelected(new Set());

  const handleImport = () => {
    const toImport = games.filter(g => selected.has(g.ext_id)).map(g => ({
      ext_id: g.ext_id,
      title: g.title,
      subtitle: `Steam · ${g.playtime_hours} hrs`,
      cover_url: g.cover_url,
      metadata: {
        platform: 'Steam',
        appid: g.appid,
        playtime_minutes: g.metadata.playtime_minutes,
        playtime_2weeks_minutes: g.metadata.playtime_2weeks_minutes,
        cover_fallback: g.cover_fallback,
      },
      status: g.playtime_hours > 0 ? 'collected' : 'wishlist',
    }));
    onImport(toImport);
  };

  return (
    <div className="steam-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="steam-modal">
        <div className="steam-modal-header">
          <div className="steam-modal-title">Import from Steam</div>
          <button className="steam-modal-close" onClick={onClose}>×</button>
        </div>
        <div className="steam-modal-body">
          <div className="steam-input-row">
            <input
              className="steam-input"
              placeholder="Steam ID, custom URL, or profile link"
              value={steamInput}
              onChange={e => setSteamInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && fetchLibrary()}
            />
            <button className="steam-fetch-btn" onClick={fetchLibrary} disabled={loading || !steamInput.trim()}>
              {loading ? 'Loading...' : 'Fetch Library'}
            </button>
          </div>

          {error && (
            <div style={{padding:'12px 16px',background:'rgba(176,64,64,.08)',border:'0.5px solid rgba(176,64,64,.2)',borderRadius:'var(--radius)',color:'#c07070',fontSize:13,marginBottom:16}}>
              {error}
            </div>
          )}

          {!fetched && !loading && !error && (
            <div style={{textAlign:'center',padding:'40px 0',color:'var(--text4)',fontSize:13,lineHeight:1.8}}>
              Enter your Steam ID or custom URL name.<br/>
              <span style={{fontSize:11}}>Example: <code style={{background:'var(--bg3)',padding:'2px 6px',borderRadius:2}}>76561198012345678</code> or <code style={{background:'var(--bg3)',padding:'2px 6px',borderRadius:2}}>gabelogannewell</code></span><br/>
              <span style={{fontSize:11}}>Or paste your full profile URL</span>
            </div>
          )}

          {fetched && games.length > 0 && (
            <>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <span className="steam-stats">{games.length} games found · {selected.size} selected</span>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={selectAll} style={{background:'none',border:'none',color:'var(--gold-dim)',cursor:'pointer',fontSize:11,fontFamily:'Geist'}}>Select all</button>
                  <button onClick={selectNone} style={{background:'none',border:'none',color:'var(--text4)',cursor:'pointer',fontSize:11,fontFamily:'Geist'}}>Clear</button>
                </div>
              </div>
              <div className="steam-game-list">
                {games.map(g => (
                  <div key={g.ext_id} className={`steam-game-row ${selected.has(g.ext_id)?'selected':''}`} onClick={() => toggleGame(g.ext_id)}>
                    <div className="steam-game-check">{selected.has(g.ext_id) ? '✓' : ''}</div>
                    <div className="steam-game-cover">
                      <img src={g.cover_url} alt="" loading="lazy" onError={e => { if (g.cover_fallback) { e.target.src = g.cover_fallback; } else { e.target.style.display='none'; }}}/>
                    </div>
                    <div className="steam-game-info">
                      <div className="steam-game-name">{g.title}</div>
                      <div className="steam-game-hours">
                        {g.playtime_hours > 0
                          ? <><span>{g.playtime_hours} hrs</span> played{g.playtime_2weeks > 0 ? ` · ${g.playtime_2weeks} hrs last 2 weeks` : ''}</>
                          : 'Never played'}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
        {fetched && games.length > 0 && (
          <div className="steam-modal-footer">
            <span className="steam-stats">
              {selected.size} game{selected.size !== 1 ? 's' : ''} will be imported
            </span>
            <button className="steam-import-btn" onClick={handleImport} disabled={selected.size === 0}>
              Import {selected.size} game{selected.size !== 1 ? 's' : ''}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Toast ───────────────────────────────────────────────────────────────── */
function Toast({ msg, onDone }) {
  useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}

/* ═══════════════════════════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [user,setUser] = useState(null);
  const [libraries,setLibraries] = useState([]);
  const [showCreate,setShowCreate] = useState(false);
  const [showAuth,setShowAuth] = useState(false);
  const [addPanel,setAddPanel] = useState(null);
  const [toast,setToast] = useState(null);
  const [currentPage,setCurrentPage] = useState(null); // null = home, or library type
  const [activeIcon,setActiveIcon] = useState(null);
  const [showTop300,setShowTop300] = useState(false);
  const [showTopAlbums,setShowTopAlbums] = useState(false);
  const [browseMovies,setBrowseMovies] = useState(false);
  const [browseAlbums,setBrowseAlbums] = useState(false);
  const [browseArtists,setBrowseArtists] = useState(false);
  const [showSteamImport,setShowSteamImport] = useState(false);

  // Load persisted state
  useEffect(()=>{
    const saved = DB.getLocalUser();
    if (saved) setUser(saved);
    const libs = DB._getLocal('libraries');
    if (libs) setLibraries(libs);
  },[]);

  // Persist libraries
  useEffect(()=>{
    if (libraries.length > 0) DB._setLocal('libraries', libraries);
  },[libraries]);

  const existing = libraries.map(l=>l.type);
  const canCreate = existing.length < 4;
  const fileMode = location.protocol === 'file:';
  const demoMode = !TMDB_KEY || fileMode;

  const showT = msg => setToast(msg);

  const handleAuth = u => {
    setUser(u);
    setShowAuth(false);
    showT(`Welcome, ${u.username||u.display_name}`);
  };

  const handleLogout = () => {
    DB.logout();
    setUser(null);
    setLibraries([]);
    showT('Signed out');
  };

  const handleCreate = type => {
    const lib = { id:'lib-'+Date.now(), type, items:[] };
    setLibraries(prev=>[...prev,lib]);
    DB.createLibrary(type);
    setShowCreate(false);
    showT(`${LIBRARY_TYPES.find(t=>t.key===type).label} library created`);
  };

  const handleAddClick = type => {
    if(!user){setShowAuth(true);return;}
    setAddPanel(type);
  };

  const handleAddItem = (libType, item) => {
    const lib = libraries.find(l=>l.type===libType);
    if (lib && (lib.items||[]).some(i=>(i.ext_id&&i.ext_id===item.ext_id)||(i.title===item.title&&i.subtitle===item.subtitle))) {
      showT(`"${item.title}" is already in your library`);
      return;
    }
    setLibraries(prev=>prev.map(l=>l.type===libType?{...l,items:[item,...(l.items||[])]}:l));
    showT(`"${item.title}" added`);
  };

  const handleRemoveItem = (library, item) => {
    setLibraries(prev=>prev.map(l=>l.type===library.type?{...l,items:(l.items||[]).filter(i=>(i.ext_id||i.id)!==(item.ext_id||item.id))}:l));
    DB.removeItem(library.id, item.id);
    showT(`"${item.title}" removed`);
  };

  const handleRateItem = (library, item, rating) => {
    const normalizedRating = rating > 0 ? rating : undefined;
    setLibraries(prev=>prev.map(l=>l.type===library.type?{
      ...l,
      items:(l.items||[]).map(i=>(i.ext_id||i.id)===(item.ext_id||item.id)?{...i,user_rating:normalizedRating}:i)
    }:l));
    if (normalizedRating) showT(`Rated "${item.title}" — ${normalizedRating.toFixed(1)}/10`);
    else showT(`Rating deleted for "${item.title}"`);
  };

  const handleMoveStatus = (library, item, newStatus) => {
    setLibraries(prev=>prev.map(l=>l.type===library.type?{
      ...l,
      items:(l.items||[]).map(i=>(i.ext_id||i.id)===(item.ext_id||item.id)?{...i,status:newStatus}:i)
    }:l));
    const label = newStatus==='wishlist'?'watchlist':'collected';
    showT(`"${item.title}" moved to ${label}`);
  };

  // Steam import — bulk add games to library
  const handleSteamImport = (games) => {
    // Ensure games library exists
    let hasGamesLib = libraries.some(l => l.type === 'games');
    if (!hasGamesLib) {
      const gamesLib = { id: 'lib-games-' + Date.now(), type: 'games', items: [] };
      setLibraries(prev => [...prev, gamesLib]);
      DB.createLibrary('games');
    }

    // Add games that aren't already in library
    setLibraries(prev => prev.map(l => {
      if (l.type !== 'games') return l;
      const existingIds = new Set((l.items || []).map(i => i.ext_id));
      const newGames = games.filter(g => !existingIds.has(g.ext_id));
      return { ...l, items: [...newGames, ...(l.items || [])] };
    }));

    setShowSteamImport(false);
    showT(`${games.length} game${games.length !== 1 ? 's' : ''} imported from Steam`);
  };

  const handleIconClick = (lib) => {
    if (!user) { setShowAuth(true); return; }
    setActiveIcon(lib.type);
    setTimeout(()=>setCurrentPage(lib.type), 200);
  };

  const goHome = () => {
    setCurrentPage(null);
    setActiveIcon(null);
    setShowTop300(false);
    setShowTopAlbums(false);
    setBrowseMovies(false);
    setBrowseAlbums(false);
    setBrowseArtists(false);
  };

  const currentLib = currentPage ? libraries.find(l=>l.type===currentPage) : null;

  const handleOpenTop300 = () => {
    setBrowseMovies(false);
    setBrowseAlbums(false);
    setBrowseArtists(false);
    setShowTop300(true);
    setShowTopAlbums(false);
    setCurrentPage(null);
    setActiveIcon(null);
    setNavOpen(false);
  };

  const handleAddFromTop300 = (movie) => {
    // Ensure films library exists
    let filmsLib = libraries.find(l=>l.type==='films');
    if (!filmsLib) {
      filmsLib = { id:'lib-'+Date.now(), type:'films', items:[] };
      setLibraries(prev=>[...prev,filmsLib]);
    }
    // Check duplicate
    if ((filmsLib.items||[]).some(i=>i.ext_id===movie.ext_id)) {
      showT(`"${movie.title}" is already in your library`);
      return;
    }
    const item = { ...movie, status:'collected' };
    setLibraries(prev=>prev.map(l=>l.type==='films'?{...l,items:[item,...(l.items||[])]}:l));
    showT(`"${movie.title}" added to Films`);
  };

  const filmsLibItems = libraries.find(l=>l.type==='films')?.items || [];

  const handleOpenTopAlbums = () => {
    setBrowseMovies(false);
    setBrowseAlbums(false);
    setBrowseArtists(false);
    setShowTopAlbums(true);
    setShowTop300(false);
    setCurrentPage(null);
    setActiveIcon(null);
    setNavOpen(false);
  };

  const handleAddFromTopAlbums = (album) => {
    let musicLib = libraries.find(l=>l.type==='music');
    if (!musicLib) {
      musicLib = { id:'lib-'+Date.now(), type:'music', items:[] };
      setLibraries(prev=>[...prev,musicLib]);
    }
    if ((musicLib.items||[]).some(i=>i.ext_id===album.ext_id || i.title===album.title)) {
      showT(`"${album.title}" is already in your library`);
      return;
    }
    const item = { ...album, status:'collected' };
    setLibraries(prev=>prev.map(l=>l.type==='music'?{...l,items:[item,...(l.items||[])]}:l));
    showT(`"${album.title}" added to Music`);
  };

  const handleAddFromTopArtists = (artist) => {
    let musicLib = libraries.find(l=>l.type==='music');
    if (!musicLib) {
      musicLib = { id:'lib-'+Date.now(), type:'music', items:[] };
      setLibraries(prev=>[...prev,musicLib]);
    }
    const extId = artist?.ext_id || `artist-${artist?.id || ''}`;
    const title = artist?.title || artist?.name || 'Unknown Artist';
    if ((musicLib.items||[]).some(i => i.ext_id === extId || i.title === title)) {
      showT(`"${title}" is already in your library`);
      return;
    }
    const item = artist?.metadata?.kind === 'artist'
      ? { ...artist, ext_id: extId, title, status:'collected' }
      : {
          ext_id: extId,
          title,
          subtitle: 'Artist',
          cover_url: artist?.cover_url || artist?.image_url || '',
          metadata: {
            kind: 'artist',
            spotify_artist_id: artist?.metadata?.spotify_artist_id || artist?.id || '',
            followers: artist?.metadata?.followers ?? artist?.followers ?? 0,
            popularity: artist?.metadata?.popularity ?? artist?.popularity ?? 0,
            genres: artist?.metadata?.genres || artist?.genres || [],
            spotify_url: artist?.metadata?.spotify_url || artist?.spotify_url || '',
          },
          status: 'collected'
        };
    setLibraries(prev=>prev.map(l=>l.type==='music'?{...l,items:[item,...(l.items||[])]}:l));
    showT(`"${title}" added to Music`);
  };

  const musicLibItems = libraries.find(l=>l.type==='music')?.items || [];

  const handleBrowseMovies = ()=>{ setBrowseMovies(true);setBrowseAlbums(false);setBrowseArtists(false);setShowTop300(false);setShowTopAlbums(false);setCurrentPage(null);setActiveIcon(null);setNavOpen(false); };
  const handleBrowseAlbums = ()=>{ setBrowseAlbums(true);setBrowseMovies(false);setBrowseArtists(false);setShowTop300(false);setShowTopAlbums(false);setCurrentPage(null);setActiveIcon(null);setNavOpen(false); };
  const handleBrowseArtists = ()=>{ setBrowseArtists(true);setBrowseMovies(false);setBrowseAlbums(false);setShowTop300(false);setShowTopAlbums(false);setCurrentPage(null);setActiveIcon(null);setNavOpen(false); };

  const [navOpen, setNavOpen] = useState(false);

  return (
    <>
      <InsightsSidebar library={currentLib} libraries={libraries}/>

      {/* Left nav drawer */}
      <div className={`nav-overlay ${navOpen?'open':''}`} onClick={()=>setNavOpen(false)}/>
      <div className={`nav-drawer ${navOpen?'open':''}`}>
        <div className="nav-drawer-header">
          <div className="nav-drawer-brand">Shelf</div>
        </div>
        <div className="nav-drawer-section">
          <div className="nav-drawer-label">Browse</div>
          <div className={`nav-drawer-item ${browseMovies?'active':''}`} onClick={handleBrowseMovies}>
            <div className="nav-drawer-icon">🎬</div>
            <span>Movies</span>
          </div>
          <div className={`nav-drawer-item ${browseAlbums?'active':''}`} onClick={handleBrowseAlbums}>
            <div className="nav-drawer-icon">🎵</div>
            <span>Albums</span>
          </div>
          <div className={`nav-drawer-item ${browseArtists?'active':''}`} onClick={handleBrowseArtists}>
            <div className="nav-drawer-icon">🎤</div>
            <span>Top Artists</span>
          </div>
        </div>
        <div className="nav-drawer-divider"/>
        <div className="nav-drawer-section">
          <div className="nav-drawer-label">Curated</div>
          <div className={`nav-drawer-item ${showTop300?'active':''}`} onClick={()=>{handleOpenTop300();setNavOpen(false);}}>
            <div className="nav-drawer-icon">🏆</div>
            <span>Top 300 Movies</span>
          </div>
          <div className={`nav-drawer-item ${showTopAlbums?'active':''}`} onClick={()=>{handleOpenTopAlbums();setNavOpen(false);}}>
            <div className="nav-drawer-icon">💿</div>
            <span>Greatest Albums</span>
          </div>
        </div>
        <div className="nav-drawer-divider"/>
        <div className="nav-drawer-section">
          <div className="nav-drawer-label">My Library</div>
          {libraries.map(lib=>(
            <div key={lib.type} className={`nav-drawer-item ${currentPage===lib.type?'active':''}`} onClick={()=>{handleIconClick(lib);setNavOpen(false);}}>
              <div className="nav-drawer-icon">{({films:'🎥',music:'🎵',books:'📚',games:'🎮'})[lib.type]||'📁'}</div>
              <span>{LIBRARY_TYPES.find(t=>t.key===lib.type)?.label||lib.type}</span>
              <span style={{marginLeft:'auto',fontSize:11,color:'var(--text4)'}}>{(lib.items||[]).length}</span>
            </div>
          ))}
          <div className="nav-drawer-divider"/>
          <div className="nav-drawer-item" onClick={()=>{setShowSteamImport(true);setNavOpen(false);}}>
            <div className="nav-drawer-icon">🎮</div>
            <span style={{color:'#6a9aca'}}>Import from Steam</span>
          </div>
        </div>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:0}}>
            <button className="hamburger-btn" onClick={()=>setNavOpen(!navOpen)} title="Menu">
              <span/><span/><span/>
            </button>
            {(currentPage || showTop300 || showTopAlbums || browseMovies || browseAlbums || browseArtists) && <button onClick={goHome} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',padding:'4px 8px 4px 0',fontSize:'18px',lineHeight:1,opacity:.6,transition:'opacity .2s'}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.6}>‹</button>}
            <div className="brand" onClick={goHome}>Shelf</div>
          </div>
          <div className="topbar-right">
            {user && (
              <button className="steam-connect-btn" onClick={()=>setShowSteamImport(true)} title="Import games from Steam" style={{width:'auto',padding:'6px 14px'}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15h-2v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3l-.5 3H13v6.95c5.05-.5 9-4.76 9-9.95 0-5.52-4.48-10-10-10z" fill="#4a7aaa"/></svg>
                <span className="steam-label" style={{fontSize:12}}>Steam</span>
              </button>
            )}
            {user
              ? (
                <div className="avatar-chip" onClick={handleLogout} title="Sign out">
                  <div className="avatar-circle">{(user.username||user.display_name||'U').slice(0,2).toUpperCase()}</div>
                  <span className="avatar-name">{user.username||user.display_name}</span>
                </div>
              )
              : <button className="btn-signin" onClick={()=>setShowAuth(true)}>Sign in</button>
            }
          </div>
        </div>

        {demoMode && !currentPage && !showTop300 && !showTopAlbums && !browseMovies && !browseAlbums && !browseArtists && (
          <div className="api-notice">
            <strong>{fileMode ? 'Local file mode' : 'Demo mode'}</strong>&nbsp;
            {fileMode
              ? <>Your browser blocks API calls from <code>file://</code>. Serve with <code>npx serve</code> or <a href="http://localhost:8000/" target="_blank">localhost:8000</a>.</>
              : <>Films &amp; Games use sample data. Books &amp; Music search live via Open Library &amp; MusicBrainz.</>}
            {!fileMode && <> For full search: get a free <a href="https://www.themoviedb.org/settings/api" target="_blank">TMDB key</a> and paste it at the top of index.html.</>}
            {' · '}<strong>Server:</strong> Run <code>node server.js</code> with your Supabase credentials for full database persistence.
          </div>
        )}

        {browseArtists ? (
          <BrowseArtistsPage onAddToLibrary={handleAddFromTopArtists} libraryItems={musicLibItems}/>
        ) : browseMovies ? (
          <BrowseMoviesPage onAddToLibrary={handleAddFromTop300} libraryItems={filmsLibItems}/>
        ) : browseAlbums ? (
          <BrowseAlbumsPage onAddToLibrary={handleAddFromTopAlbums} libraryItems={musicLibItems}/>
        ) : showTopAlbums ? (
          <TopAlbumsPage
            onBack={goHome}
            onAddToLibrary={handleAddFromTopAlbums}
            libraryItems={musicLibItems}
          />
        ) : showTop300 ? (
          <Top300Page
            onBack={goHome}
            onAddToLibrary={handleAddFromTop300}
            libraryItems={filmsLibItems}
          />
        ) : currentPage && currentLib ? (
          <LibraryPage
            library={currentLib}
            onBack={goHome}
            onAddClick={()=>handleAddClick(currentLib.type)}
            onRemoveItem={handleRemoveItem}
            onRateItem={handleRateItem}
            onMoveStatus={handleMoveStatus}
          />
        ) : (
          <>
            <div className="shelves">
              {libraries.map((lib,i)=>(
                <div key={lib.type} className="shelf-row" style={{animationDelay:`${i*0.07}s`}}>
                  <div
                    className={`shelf-icon-block ${activeIcon===lib.type?'active':''}`}
                    onClick={()=>handleIconClick(lib)}
                    onMouseEnter={()=>setActiveIcon(lib.type)}
                    onMouseLeave={()=>{ if(currentPage!==lib.type) setActiveIcon(null); }}
                  >
                    <ShelfIcon type={LIBRARY_TYPES.find(t=>t.key===lib.type)?.icon||lib.type} active={activeIcon===lib.type} size={56}/>
                  </div>
                  {(lib.items||[]).length > 0 ? (
                    <>
                      <div className="shelf-items">
                        {((lib.type==='films'
                          ? [...(lib.items||[])].sort((a,b)=>{
                              const aHasUser = typeof a.user_rating === 'number' && a.user_rating > 0;
                              const bHasUser = typeof b.user_rating === 'number' && b.user_rating > 0;
                              // User-rated items first
                              if (aHasUser && !bHasUser) return -1;
                              if (!aHasUser && bHasUser) return 1;
                              // Then sort rated items by user score desc
                              if (aHasUser && bHasUser) return b.user_rating - a.user_rating;
                              // Both unrated: keep existing order
                              return 0;
                            })
                          : (lib.items||[])
                        )).map((item,j)=><MediaCard key={item.ext_id||j} libType={lib.type} item={item} onClick={()=>handleIconClick(lib)}/>)}
                      </div>
                      <div className="shelf-end">
                        <div className="shelf-count">{(lib.items||[]).length} item{(lib.items||[]).length!==1?'s':''}</div>
                        <button className="shelf-all" onClick={()=>handleAddClick(lib.type)}>+ Add</button>
                      </div>
                    </>
                  ) : (
                    <div className="shelf-empty" onClick={()=>handleAddClick(lib.type)}>
                      <SmallIcon type="plus" size={14}/>
                      <span>Add your first {LIBRARY_TYPES.find(t=>t.key===lib.type)?.label.toLowerCase()}</span>
                    </div>
                  )}
                </div>
              ))}

              {canCreate && (
                <div className="shelf-row" style={{animationDelay:`${libraries.length*0.07}s`}}>
                  <div className="shelf-icon-block" style={{opacity:.2}}>
                    <ShelfIcon type="plus" size={32}/>
                  </div>
                  <div className="shelf-empty" onClick={()=>user?setShowCreate(true):setShowAuth(true)}>
                    <SmallIcon type="plus" size={14}/>
                    <span>Create a new library</span>
                  </div>
                </div>
              )}
            </div>

            <div className="footer">
              <span className="footer-label">Shelf · Personal media library</span>
              {canCreate && user && <button className="btn-primary" style={{padding:'8px 20px'}} onClick={()=>setShowCreate(true)}>+ New library</button>}
            </div>
          </>
        )}
      </div>

      {showCreate && <CreateModal existing={existing} onClose={()=>setShowCreate(false)} onCreate={handleCreate}/>}
      {showAuth && <AuthModal onClose={()=>setShowAuth(false)} onAuth={handleAuth}/>}
      {addPanel && <AddPanel libType={addPanel} onClose={()=>setAddPanel(null)} onAdd={item=>handleAddItem(addPanel,item)} existingItems={(libraries.find(l=>l.type===addPanel)?.items)||[]}/>}
      {showSteamImport && <SteamImportModal onClose={()=>setShowSteamImport(false)} onImport={handleSteamImport}/>}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
