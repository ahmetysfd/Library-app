<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist:wght@300;400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --bg:        #0d0b09;
  --bg2:       #131008;
  --bg3:       #1a1612;
  --border:    #2a2520;
  --border2:   #1e1a14;
  --gold:      #b8965a;
  --gold-dim:  #7a6038;
  --text:      #e8e0d4;
  --text2:     #7a7268;
  --text3:     #3a3530;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ─── TOP BAR ─────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 48px 0;
}

.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.avatar-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg3);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  color: var(--gold);
  cursor: pointer;
  transition: border-color 0.2s;
}
.avatar-btn:hover { border-color: var(--gold); }

/* ─── HERO ───────────────────────────────────── */
.hero {
  padding: 32px 48px 36px;
}

.library-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--text);
}

.library-label em { color: var(--gold); font-style: italic; }

/* ─── SHELVES ────────────────────────────────── */
.shelves {
  padding: 0 48px 48px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.shelf-row {
  display: flex;
  align-items: center;
  gap: 18px;
  min-height: 100px;
}

/* icon block */
.shelf-icon-block {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 0.5px solid var(--border);
  border-radius: 2px;
  background: var(--bg3);
}
.shelf-icon-block svg { width: 22px; height: 22px; opacity: 0.5; }

/* empty shelf — the + row */
.shelf-empty {
  flex: 1;
  height: 92px;
  border: 0.5px dashed var(--border);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  gap: 12px;
  color: var(--text3);
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.shelf-empty:hover {
  border-color: var(--gold-dim);
  background: #1a160e;
  color: var(--gold);
}
.shelf-empty:hover .plus-icon { stroke: var(--gold); }

.plus-icon { width: 18px; height: 18px; flex-shrink: 0; }

/* items strip */
.shelf-items {
  flex: 1;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  overflow: hidden;
}

.shelf-end {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.shelf-count {
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
}
.shelf-view-all {
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text3);
  cursor: pointer;
  transition: color 0.2s;
  background: none;
  border: none;
  font-family: inherit;
}
.shelf-view-all:hover { color: var(--gold); }

/* ─── MEDIA CARDS ─────────────────────────────── */
.media-card {
  flex: 0 0 auto;
  cursor: pointer;
  transition: opacity 0.18s;
}
.media-card:hover { opacity: 0.72; }

.book-cover {
  width: 62px;
  height: 88px;
  border: 0.5px solid var(--border);
  border-radius: 1px 3px 3px 1px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.book-cover::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: #0d0a06;
  border-right: 0.5px solid #222018;
  z-index: 1;
}
.book-accent {
  position: absolute;
  top: 0; left: 5px; right: 0;
  height: 3px;
}
.book-body {
  position: absolute;
  left: 10px; bottom: 6px; right: 4px;
}

.film-cover {
  width: 56px;
  height: 82px;
  border: 0.5px solid var(--border);
  border-radius: 1px;
  position: relative;
  overflow: hidden;
}
.film-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.film-body {
  position: absolute;
  bottom: 5px; left: 5px; right: 5px;
}

.album-cover {
  width: 74px;
  height: 74px;
  border: 0.5px solid var(--border);
  position: relative;
  overflow: hidden;
}
.vinyl {
  position: absolute;
  right: 5px;
  top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #060504;
  border: 0.5px solid #333;
  display: flex; align-items: center; justify-content: center;
}
.vinyl-dot { width: 12px; height: 12px; border-radius: 50%; }
.album-body { position: absolute; left: 5px; bottom: 5px; right: 26px; }

.game-cover {
  width: 66px;
  height: 82px;
  border: 0.5px solid var(--border);
  border-radius: 1px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.game-band {
  height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.game-platform {
  font-size: 6px; font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text3);
}
.game-body {
  flex: 1;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 4px 5px 5px;
}

.cover-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; font-weight: 400;
  color: #c9b07a; line-height: 1.2;
}
.cover-sub { font-size: 7px; font-weight: 300; color: var(--text3); margin-top: 1px; }
.card-label {
  font-size: 9px; font-weight: 300;
  color: var(--text3); margin-top: 5px;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 74px;
}

/* ─── MODAL ───────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  animation: fade-in 0.15s ease;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: #131008;
  border: 0.5px solid var(--border);
  border-radius: 3px;
  padding: 36px 40px;
  width: 480px;
  max-width: calc(100vw - 32px);
  animation: slide-up 0.18s ease;
}
@keyframes slide-up { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 300;
  color: var(--text);
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 11px; font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--text3);
  margin-bottom: 28px;
}

.lib-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.lib-option {
  padding: 20px 16px;
  border: 0.5px solid var(--border);
  border-radius: 2px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex; flex-direction: column; gap: 10px;
  background: transparent;
  text-align: left;
}
.lib-option:hover {
  border-color: var(--gold-dim);
  background: #1a160e;
}
.lib-option.selected {
  border-color: var(--gold);
  background: #1a160e;
}
.lib-option.disabled {
  opacity: 0.3;
  cursor: not-allowed;
  pointer-events: none;
}
.lib-option svg { width: 20px; height: 20px; opacity: 0.6; }
.lib-option.selected svg { opacity: 0.85; }

.option-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 300;
  color: var(--gold);
}
.option-note {
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text3);
}

.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end;
}

.btn-cancel, .btn-create {
  font-family: 'Geist', sans-serif;
  font-size: 10px; font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 9px 22px;
  border-radius: 1px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-cancel {
  background: transparent;
  border: 0.5px solid var(--border);
  color: var(--text3);
}
.btn-cancel:hover { border-color: var(--text3); color: var(--text2); }

.btn-create {
  background: transparent;
  border: 0.5px solid var(--gold-dim);
  color: var(--gold);
}
.btn-create:hover { background: #1a160e; border-color: var(--gold); }
.btn-create:disabled { opacity: 0.3; cursor: not-allowed; }

/* ─── AUTH MODAL ──────────────────────────────── */
.auth-modal { width: 380px; }
.form-field { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 1px;
  padding: 10px 12px;
  font-family: 'Geist', sans-serif;
  font-size: 13px; font-weight: 300;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--gold-dim); }
.form-input::placeholder { color: var(--text3); }

.form-toggle {
  font-size: 11px; font-weight: 300;
  color: var(--text3);
  margin-top: 16px;
  text-align: center;
}
.form-toggle span {
  color: var(--gold);
  cursor: pointer;
  text-decoration: underline;
}

.error-msg {
  font-size: 10px;
  color: #c94040;
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}

/* ─── TOAST ───────────────────────────────────── */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 2px;
  padding: 12px 24px;
  font-size: 11px; font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--text2);
  z-index: 200;
  animation: fade-in 0.2s ease;
  white-space: nowrap;
}

/* ─── FOOTER ──────────────────────────────────── */
.footer {
  padding: 12px 48px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-label {
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text3);
}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Types & Constants ────────────────────────────────────────────────────────
const LIBRARY_TYPES = [
  { key: 'books',  label: 'Books',     icon: 'book'   },
  { key: 'films',  label: 'Films & TV', icon: 'film'  },
  { key: 'music',  label: 'Music',     icon: 'music'  },
  { key: 'games',  label: 'Games',     icon: 'game'   },
];

// ─── Sample seed data ─────────────────────────────────────────────────────────
const SEED_ITEMS = {
  books: [
    { id:1, title:'1984',          subtitle:'Orwell',   cover_color:'#12200e' },
    { id:2, title:'Sapiens',       subtitle:'Harari',   cover_color:'#201408' },
    { id:3, title:'Atomic Habits', subtitle:'Clear',    cover_color:'#0c1220' },
    { id:4, title:'Dune',          subtitle:'Herbert',  cover_color:'#18100e' },
    { id:5, title:'The Road',      subtitle:'McCarthy', cover_color:'#141414' },
    { id:6, title:'Solaris',       subtitle:'Lem',      cover_color:'#0c1618' },
  ],
  films: [
    { id:1, title:'Inception',    subtitle:'2010', cover_color:'#0e1420' },
    { id:2, title:'Dune',         subtitle:'2021', cover_color:'#1a1408' },
    { id:3, title:'Interstellar', subtitle:'2014', cover_color:'#100c1a' },
    { id:4, title:'Blade Runner', subtitle:'2049', cover_color:'#180a0a' },
    { id:5, title:'The Matrix',   subtitle:'1999', cover_color:'#0a1810' },
    { id:6, title:'Alien',        subtitle:'1979', cover_color:'#140e0e' },
    { id:7, title:'Arrival',      subtitle:'2016', cover_color:'#0a1414' },
  ],
  music: [
    { id:1, title:'Kind of Blue',  subtitle:'Miles Davis',  vinyl:'#143020', cover_color:'#0a1208' },
    { id:2, title:'Dark Side',     subtitle:'Pink Floyd',   vinyl:'#301820', cover_color:'#18100a' },
    { id:3, title:'OK Computer',   subtitle:'Radiohead',    vinyl:'#141430', cover_color:'#0a0a18' },
    { id:4, title:'Nevermind',     subtitle:'Nirvana',      vinyl:'#0a1428', cover_color:'#100a18' },
    { id:5, title:'Thriller',      subtitle:'M. Jackson',   vinyl:'#301010', cover_color:'#180a0a' },
    { id:6, title:'Abbey Road',    subtitle:'The Beatles',  vinyl:'#302818', cover_color:'#181410' },
  ],
  games: [
    { id:1, title:'Elden Ring',    subtitle:'RPG · 2022',     band:'#0a1208', cover_color:'#12180e', platform:'PC'    },
    { id:2, title:'Cyberpunk',     subtitle:'RPG · 2020',     band:'#100a18', cover_color:'#18100e', platform:'PC'    },
    { id:3, title:'Minecraft',     subtitle:'Sandbox · 2011', band:'#0a1a10', cover_color:'#0e180e', platform:'Multi' },
    { id:4, title:'FIFA 25',       subtitle:'Sports · 2024',  band:'#1a0a0a', cover_color:'#180e0e', platform:'PS5'   },
    { id:5, title:'RDR2',          subtitle:'Adventure',      band:'#181408', cover_color:'#16120a', platform:'PC'    },
    { id:6, title:'Half-Life 2',   subtitle:'FPS · 2004',     band:'#0a1418', cover_color:'#0c1418', platform:'PC'    },
  ],
};

// ─── Icons ────────────────────────────────────────────────────────────────────
function Icon({ type, ...props }) {
  const g = '#b8965a';
  if (type === 'book') return (
    <svg viewBox="0 0 22 22" fill="none" {...props}>
      <rect x="4" y="2" width="10" height="18" rx="0.5" stroke={g} strokeWidth="0.9"/>
      <rect x="7" y="2" width="10" height="18" rx="0.5" stroke={g} strokeWidth="0.9" fill="#0d0b09"/>
      <line x1="10" y1="7" x2="14" y2="7" stroke={g} strokeWidth="0.6"/>
      <line x1="10" y1="11" x2="14" y2="11" stroke={g} strokeWidth="0.6"/>
    </svg>
  );
  if (type === 'film') return (
    <svg viewBox="0 0 22 22" fill="none" {...props}>
      <rect x="2" y="4" width="18" height="14" rx="1" stroke={g} strokeWidth="0.9"/>
      <circle cx="11" cy="11" r="3.5" stroke={g} strokeWidth="0.9"/>
      <circle cx="11" cy="11" r="1" fill={g}/>
    </svg>
  );
  if (type === 'music') return (
    <svg viewBox="0 0 22 22" fill="none" {...props}>
      <circle cx="11" cy="11" r="8.5" stroke={g} strokeWidth="0.9"/>
      <circle cx="11" cy="11" r="2.8" stroke={g} strokeWidth="0.9"/>
      <circle cx="11" cy="11" r="0.9" fill={g}/>
    </svg>
  );
  if (type === 'game') return (
    <svg viewBox="0 0 22 22" fill="none" {...props}>
      <rect x="2" y="6" width="18" height="12" rx="1" stroke={g} strokeWidth="0.9"/>
      <circle cx="7" cy="12" r="2" stroke={g} strokeWidth="0.8"/>
      <circle cx="15" cy="12" r="2" stroke={g} strokeWidth="0.8"/>
      <circle cx="11" cy="12" r="0.8" fill={g}/>
    </svg>
  );
  if (type === 'plus') return (
    <svg className="plus-icon" viewBox="0 0 18 18" fill="none" {...props}>
      <line x1="9" y1="3" x2="9" y2="15" stroke="currentColor" strokeWidth="1"/>
      <line x1="3" y1="9" x2="15" y2="9" stroke="currentColor" strokeWidth="1"/>
    </svg>
  );
  return null;
}

// ─── Media Cards ──────────────────────────────────────────────────────────────
function BookCard({ item }) {
  return (
    <div className="media-card">
      <div className="book-cover" style={{ background: item.cover_color }}>
        <div className="book-accent" style={{ background: item.cover_color + 'cc' }}/>
        <div className="book-body">
          <div className="cover-title">{item.title}</div>
          <div className="cover-sub">{item.subtitle}</div>
        </div>
      </div>
      <div className="card-label">{item.title}</div>
    </div>
  );
}

function FilmCard({ item }) {
  return (
    <div className="media-card">
      <div className="film-cover" style={{ background: item.cover_color }}>
        <div className="film-accent" style={{ background: item.cover_color + 'cc' }}/>
        <div className="film-body">
          <div className="cover-title">{item.title}</div>
          <div className="cover-sub">{item.subtitle}</div>
        </div>
      </div>
      <div className="card-label" style={{ maxWidth: 56 }}>{item.title}</div>
    </div>
  );
}

function AlbumCard({ item }) {
  return (
    <div className="media-card">
      <div className="album-cover" style={{ background: item.cover_color }}>
        <div className="album-body">
          <div className="cover-title">{item.title}</div>
          <div className="cover-sub">{item.subtitle}</div>
        </div>
        <div className="vinyl">
          <div className="vinyl-dot" style={{ background: item.vinyl || '#1a2a1a' }}/>
        </div>
      </div>
      <div className="card-label" style={{ maxWidth: 74 }}>{item.title}</div>
    </div>
  );
}

function GameCard({ item }) {
  return (
    <div className="media-card">
      <div className="game-cover">
        <div className="game-band" style={{ background: item.band }}>
          <span className="game-platform">{item.platform}</span>
        </div>
        <div className="game-body" style={{ background: item.cover_color }}>
          <div className="cover-title">{item.title}</div>
          <div className="cover-sub">{item.subtitle}</div>
        </div>
      </div>
      <div className="card-label" style={{ maxWidth: 66 }}>{item.title}</div>
    </div>
  );
}

function MediaCard({ type, item }) {
  if (type === 'books') return <BookCard item={item} />;
  if (type === 'films') return <FilmCard item={item} />;
  if (type === 'music') return <AlbumCard item={item} />;
  if (type === 'games') return <GameCard item={item} />;
  return null;
}

// ─── Create Library Modal ─────────────────────────────────────────────────────
function CreateLibraryModal({ existing, onClose, onCreate }) {
  const [selected, setSelected] = useState(null);

  const available = LIBRARY_TYPES.filter(t => !existing.includes(t.key));

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">Add a library</div>
        <div className="modal-sub">One of each type per profile · Choose what to create</div>
        <div className="lib-options">
          {LIBRARY_TYPES.map(t => {
            const taken = existing.includes(t.key);
            return (
              <button
                key={t.key}
                className={`lib-option ${selected === t.key ? 'selected' : ''} ${taken ? 'disabled' : ''}`}
                onClick={() => !taken && setSelected(t.key)}
              >
                <Icon type={t.icon} style={{ width: 20, height: 20 }} />
                <div className="option-name">{t.label}</div>
                <div className="option-note">{taken ? 'Already created' : 'Empty · Ready to fill'}</div>
              </button>
            );
          })}
        </div>
        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-create" disabled={!selected} onClick={() => selected && onCreate(selected)}>
            Create library
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Auth Modal ───────────────────────────────────────────────────────────────
function AuthModal({ onClose, onAuth }) {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ username: '', email: '', password: '' });
  const [error, setError] = useState('');

  const handle = (e) => {
    e.preventDefault();
    setError('');
    if (mode === 'register' && form.username.length < 2) {
      return setError('Username must be at least 2 characters');
    }
    if (!form.email.includes('@')) return setError('Enter a valid email');
    if (form.password.length < 6) return setError('Password must be at least 6 characters');
    // In production: POST /api/auth/login or /register
    onAuth({ username: form.username || form.email.split('@')[0], email: form.email });
  };

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal auth-modal">
        <div className="modal-title">{mode === 'login' ? 'Sign in' : 'Create account'}</div>
        <div className="modal-sub" style={{ marginBottom: 20 }}>
          {mode === 'login' ? 'Access your collection' : 'Start building your library'}
        </div>
        {error && <div className="error-msg">{error}</div>}
        <form onSubmit={handle}>
          {mode === 'register' && (
            <div className="form-field">
              <label className="form-label">Username</label>
              <input className="form-input" placeholder="your_handle"
                value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} />
            </div>
          )}
          <div className="form-field">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" placeholder="you@example.com"
              value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} />
          </div>
          <div className="form-field">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="••••••••"
              value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} />
          </div>
          <div className="modal-actions" style={{ marginTop: 20 }}>
            <button type="button" className="btn-cancel" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn-create">
              {mode === 'login' ? 'Sign in' : 'Create account'}
            </button>
          </div>
        </form>
        <div className="form-toggle">
          {mode === 'login'
            ? <>No account? <span onClick={() => setMode('register')}>Sign up</span></>
            : <>Have an account? <span onClick={() => setMode('login')}>Sign in</span></>}
        </div>
      </div>
    </div>
  );
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2400);
    return () => clearTimeout(t);
  }, []);
  return <div className="toast">{message}</div>;
}

// ─── Shelf Row ────────────────────────────────────────────────────────────────
function ShelfRow({ libraryType, items, onAddClick }) {
  const def = LIBRARY_TYPES.find(t => t.key === libraryType);
  const hasItems = items && items.length > 0;

  return (
    <div className="shelf-row">
      <div className="shelf-icon-block">
        <Icon type={def.icon} />
      </div>

      {hasItems ? (
        <>
          <div className="shelf-items">
            {items.map(item => (
              <MediaCard key={item.id} type={libraryType} item={item} />
            ))}
          </div>
          <div className="shelf-end">
            <div className="shelf-count">{items.length} items</div>
            <button className="shelf-view-all">All →</button>
          </div>
        </>
      ) : (
        <div className="shelf-empty" onClick={onAddClick}>
          <Icon type="plus" />
          <span>Add your first {def.label.toLowerCase()}</span>
        </div>
      )}
    </div>
  );
}

// ─── Empty Shelf Placeholder (not yet created) ────────────────────────────────
function EmptyShelfPlaceholder({ onCreateClick }) {
  return (
    <div className="shelf-row">
      <div className="shelf-icon-block" style={{ opacity: 0.25 }}>
        <svg viewBox="0 0 22 22" fill="none" style={{ width: 22, height: 22 }}>
          <line x1="11" y1="4" x2="11" y2="18" stroke="#b8965a" strokeWidth="1"/>
          <line x1="4" y1="11" x2="18" y2="11" stroke="#b8965a" strokeWidth="1"/>
        </svg>
      </div>
      <div className="shelf-empty" onClick={onCreateClick}>
        <Icon type="plus" />
        <span>Create a new library</span>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [libraries, setLibraries] = useState([]);   // array of {type, items}
  const [showCreate, setShowCreate] = useState(false);
  const [showAuth, setShowAuth] = useState(false);
  const [toast, setToast] = useState(null);

  // How many "slots" to show — always show existing + at least 1 empty row (up to 4 total)
  const existingTypes = libraries.map(l => l.type);
  const canCreate = existingTypes.length < 4;

  // Rows to render: existing libraries + one "add" row if space remains
  const rows = [...libraries];

  const showToast = (msg) => setToast(msg);

  const handleAuth = (userData) => {
    setUser(userData);
    setShowAuth(false);
    showToast(`Welcome, ${userData.username}`);
  };

  const handleCreateLibrary = (type) => {
    if (existingTypes.includes(type)) return;
    const newLib = { type, items: [] };
    setLibraries(prev => [...prev, newLib]);
    setShowCreate(false);
    const def = LIBRARY_TYPES.find(t => t.key === type);
    showToast(`${def.label} library created`);
    // In production: POST /api/libraries { type }
  };

  const handleCreateClick = () => {
    if (!user) {
      setShowAuth(true);
    } else {
      setShowCreate(true);
    }
  };

  // Simulate loading seed data for demo purposes
  const handleSeedDemo = () => {
    if (!user) { setShowAuth(true); return; }
    const types = ['books', 'films', 'music', 'games'];
    const demo = types.map(type => ({ type, items: SEED_ITEMS[type] }));
    setLibraries(demo);
    showToast('Demo collection loaded');
  };

  const initials = user ? user.username.slice(0, 2).toUpperCase() : '?';

  return (
    <>
      {/* TOP BAR */}
      <div className="topbar">
        <div className="brand">Shelf</div>
        <div className="topbar-right">
          {user ? (
            <>
              <button className="shelf-view-all" style={{ color: 'var(--text3)', fontSize: 10 }}
                onClick={handleSeedDemo}>
                Load demo
              </button>
              <div className="avatar-btn" title={user.username}>{initials}</div>
            </>
          ) : (
            <button className="btn-create" style={{ padding: '7px 18px' }}
              onClick={() => setShowAuth(true)}>
              Sign in
            </button>
          )}
        </div>
      </div>

      {/* HERO */}
      <div className="hero">
        <div className="library-label">
          {user ? <><em>{user.username}</em>'s library</> : 'Library'}
        </div>
      </div>

      {/* SHELVES */}
      <div className="shelves">
        {rows.map(lib => (
          <ShelfRow
            key={lib.type}
            libraryType={lib.type}
            items={lib.items}
            onAddClick={() => showToast('Item adding coming soon')}
          />
        ))}

        {/* Empty create rows: always show at least 1 if < 4 */}
        {canCreate && (
          <EmptyShelfPlaceholder onCreateClick={handleCreateClick} />
        )}
      </div>

      {/* FOOTER */}
      <div className="footer">
        <span className="footer-label">Shelf · Personal media library</span>
        {canCreate && user && (
          <button className="btn-create" style={{ padding: '8px 20px' }}
            onClick={() => setShowCreate(true)}>
            + New library
          </button>
        )}
      </div>

      {/* MODALS */}
      {showCreate && (
        <CreateLibraryModal
          existing={existingTypes}
          onClose={() => setShowCreate(false)}
          onCreate={handleCreateLibrary}
        />
      )}
      {showAuth && (
        <AuthModal onClose={() => setShowAuth(false)} onAuth={handleAuth} />
      )}

      {/* TOAST */}
      {toast && <Toast message={toast} onDone={() => setToast(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
