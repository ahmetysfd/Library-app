            <div className="ins-type-row">
              <div className="ins-type-cell">
                <div className="ins-type-value">{insights.movieCount || insights.total}</div>
                <div className="ins-type-label">{library.type==='films'?'Movies':library.type==='games'?'Games':library.type==='books'?'Books':'Albums'}</div>
              </div>
              <div className="ins-type-cell">
                <div className="ins-type-value">{library.type==='films'? insights.showCount : insights.watchlist}</div>
                <div className="ins-type-label">{library.type==='films'?'Shows':'Watchlist'}</div>
              </div>
            </div>

            {/* ── Top 4 Directors — 2×2 grid ── */}
            {topDirs.length > 0 && (
              <div className="ins-directors">
                <div className="ins-directors-title">
                  <svg viewBox="0 0 16 16" fill="none"><path d="M8 1l2 4 4.5.7-3.3 3.2.8 4.5L8 11.2 3.9 13.4l.8-4.5L1.5 5.7 6 5z" fill="var(--gold)" opacity=".6"/></svg>
                  Top Directors
                </div>
                <div className="ins-directors-grid">
                  {topDirs.map((d, i) => (
                    <div key={d.director} className="ins-dir-card" style={{animationDelay:`${i*0.07}s`}}>
                      <div className="ins-dir-head">
                        <div className="ins-dir-name">{d.director}</div>
                        <div className="ins-dir-count">{d.count} {d.count===1?'film':'films'}</div>
                      </div>
                      <div className="ins-dir-films">
                        {d.films.map((film, j) => (
                          <div key={film.ext_id||j} className="ins-dir-film-thumb">
                            <div className="ins-dir-film-poster">
                              <img src={film.cover_url} alt={film.title} onError={e=>{e.target.style.visibility='hidden'}}/>
                            </div>
                            <div className="ins-dir-film-title">{film.title.length>10?film.title.slice(0,9)+'…':film.title}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── Genre Distribution — clean horizontal bars ── */}
            {genreData.length > 0 && (
              <div className="ins-genre-chart">
                <div className="ins-genre-chart-title">
                  <svg viewBox="0 0 16 16" width="14" height="14" fill="none" style={{opacity:.5}}><path d="M2 14L5 8l3 4 3-7 3 5" stroke="var(--gold)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  Genre Distribution
                </div>
                <div className="ins-genre-rows">
                  {genreData.map(([genre, count], i) => {
                    const barW = (count / genreMax) * 100;
                    return (
                      <div key={genre} className="ins-genre-row" style={{animationDelay:`${i*0.06}s`,animation:'fadeUp .4s ease both'}}>
                        <div className="ins-genre-label">{genre}</div>
                        <div className="ins-genre-bar-wrap">
                          <div className="ins-genre-bar" style={{width:`${barW}%`,background:GENRE_COLORS[i%GENRE_COLORS.length]}}/>
                        </div>
                        <div className="ins-genre-pct">{count}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ─── Toast ───────────────────────────────────────────────────────────────── */
function Toast({ msg, onDone }) {
  useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}


/* ═══════════════════════════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [user,setUser] = useState(null);
  const [libraries,setLibraries] = useState([]);
  const [showCreate,setShowCreate] = useState(false);
  const [showAuth,setShowAuth] = useState(false);
  const [addPanel,setAddPanel] = useState(null);
  const [toast,setToast] = useState(null);
  const [currentPage,setCurrentPage] = useState(null); // null = home, or library type
  const [activeIcon,setActiveIcon] = useState(null);

  // Load persisted state
  useEffect(()=>{
    const saved = DB.getLocalUser();
    if (saved) setUser(saved);
    const libs = DB._getLocal('libraries');
    if (libs) setLibraries(libs);
  },[]);

  // Persist libraries
  useEffect(()=>{
    if (libraries.length > 0) DB._setLocal('libraries', libraries);
  },[libraries]);

  const existing = libraries.map(l=>l.type);
  const canCreate = existing.length < 4;
  const fileMode = location.protocol === 'file:';
  const demoMode = !TMDB_KEY || fileMode;

  const showT = msg => setToast(msg);

  const handleAuth = u => {
    setUser(u);
    setShowAuth(false);
    showT(`Welcome, ${u.username||u.display_name}`);
  };

  const handleLogout = () => {
    DB.logout();
    setUser(null);
    setLibraries([]);
    showT('Signed out');
  };

  const handleCreate = type => {
    const lib = { id:'lib-'+Date.now(), type, items:[] };
    setLibraries(prev=>[...prev,lib]);
    DB.createLibrary(type);
    setShowCreate(false);
    showT(`${LIBRARY_TYPES.find(t=>t.key===type).label} library created`);
  };

  const handleAddClick = type => {
    if(!user){setShowAuth(true);return;}
    setAddPanel(type);
  };

  const handleAddItem = (libType, item) => {
    const lib = libraries.find(l=>l.type===libType);
    if (lib && (lib.items||[]).some(i=>(i.ext_id&&i.ext_id===item.ext_id)||(i.title===item.title&&i.subtitle===item.subtitle))) {
      showT(`"${item.title}" is already in your library`);
      return;
    }
    setLibraries(prev=>prev.map(l=>l.type===libType?{...l,items:[item,...(l.items||[])]}:l));
    showT(`"${item.title}" added`);
  };

  const handleRemoveItem = (library, item) => {
    setLibraries(prev=>prev.map(l=>l.type===library.type?{...l,items:(l.items||[]).filter(i=>(i.ext_id||i.id)!==(item.ext_id||item.id))}:l));
    DB.removeItem(library.id, item.id);
    showT(`"${item.title}" removed`);
  };

  const handleRateItem = (library, item, rating) => {
    const normalizedRating = rating > 0 ? rating : undefined;
    setLibraries(prev=>prev.map(l=>l.type===library.type?{
      ...l,
      items:(l.items||[]).map(i=>(i.ext_id||i.id)===(item.ext_id||item.id)?{...i,user_rating:normalizedRating}:i)
    }:l));
    if (normalizedRating) showT(`Rated "${item.title}" — ${normalizedRating.toFixed(1)}/10`);
    else showT(`Rating deleted for "${item.title}"`);
  };

  const handleMoveStatus = (library, item, newStatus) => {
    setLibraries(prev=>prev.map(l=>l.type===library.type?{
      ...l,
      items:(l.items||[]).map(i=>(i.ext_id||i.id)===(item.ext_id||item.id)?{...i,status:newStatus}:i)
    }:l));
    const label = newStatus==='wishlist'?'watchlist':'collected';
    showT(`"${item.title}" moved to ${label}`);
  };

  const handleIconClick = (lib) => {
    if (!user) { setShowAuth(true); return; }
    setActiveIcon(lib.type);
    setTimeout(()=>setCurrentPage(lib.type), 200);
  };

  const goHome = () => {
    setCurrentPage(null);
    setActiveIcon(null);
  };

  const currentLib = currentPage ? libraries.find(l=>l.type===currentPage) : null;

  return (
    <>
      <InsightsSidebar library={currentLib} libraries={libraries}/>
      <div className="main-content">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:0}}>
            {currentPage && <button onClick={goHome} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',padding:'4px 8px 4px 0',fontSize:'18px',lineHeight:1,opacity:.6,transition:'opacity .2s'}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.6}>‹</button>}
            <div className="brand" onClick={goHome}>Shelf</div>
          </div>
          <div className="topbar-right">
            {user
              ? (
                <div className="avatar-chip" onClick={handleLogout} title="Sign out">
                  <div className="avatar-circle">{(user.username||user.display_name||'U').slice(0,2).toUpperCase()}</div>
                  <span className="avatar-name">{user.username||user.display_name}</span>
                </div>
              )
              : <button className="btn-signin" onClick={()=>setShowAuth(true)}>Sign in</button>
            }
          </div>
        </div>

        {demoMode && !currentPage && (
          <div className="api-notice">
            <strong>{fileMode ? 'Local file mode' : 'Demo mode'}</strong>&nbsp;
            {fileMode
              ? <>Your browser blocks API calls from <code>file://</code>. Serve with <code>npx serve</code> or <a href="http://localhost:8000/" target="_blank">localhost:8000</a>.</>
              : <>Films &amp; Games use sample data. Books &amp; Music search live via Open Library &amp; MusicBrainz.</>}
            {!fileMode && <> For full search: get a free <a href="https://www.themoviedb.org/settings/api" target="_blank">TMDB key</a> and paste it at the top of index.html.</>}
            {' · '}<strong>Server:</strong> Run <code>node server.js</code> with your Supabase credentials for full database persistence.
          </div>
        )}

        {currentPage && currentLib ? (
          <LibraryPage
            library={currentLib}
            onBack={goHome}
            onAddClick={()=>handleAddClick(currentLib.type)}
            onRemoveItem={handleRemoveItem}
            onRateItem={handleRateItem}
            onMoveStatus={handleMoveStatus}
          />
        ) : (
          <>
            <div className="shelves">
              {libraries.map((lib,i)=>(
                <div key={lib.type} className="shelf-row" style={{animationDelay:`${i*0.07}s`}}>
                  <div
                    className={`shelf-icon-block ${activeIcon===lib.type?'active':''}`}
                    onClick={()=>handleIconClick(lib)}
                    onMouseEnter={()=>setActiveIcon(lib.type)}
                    onMouseLeave={()=>{ if(currentPage!==lib.type) setActiveIcon(null); }}
                  >
                    <ShelfIcon type={LIBRARY_TYPES.find(t=>t.key===lib.type)?.icon||lib.type} active={activeIcon===lib.type} size={56}/>
                  </div>
                  {(lib.items||[]).length > 0 ? (
                    <>
                      <div className="shelf-items">
                        {((lib.type==='films'
                          ? [...(lib.items||[])].sort((a,b)=>{
                              const aHasUser = typeof a.user_rating === 'number' && a.user_rating > 0;
                              const bHasUser = typeof b.user_rating === 'number' && b.user_rating > 0;
                              // User-rated items first
                              if (aHasUser && !bHasUser) return -1;
                              if (!aHasUser && bHasUser) return 1;
                              // Then sort rated items by user score desc
                              if (aHasUser && bHasUser) return b.user_rating - a.user_rating;
                              // Both unrated: keep existing order
                              return 0;
                            })
                          : (lib.items||[])
                        )).map((item,j)=><MediaCard key={item.ext_id||j} libType={lib.type} item={item} onClick={()=>handleIconClick(lib)}/>)}
                      </div>
                      <div className="shelf-end">
                        <div className="shelf-count">{(lib.items||[]).length} item{(lib.items||[]).length!==1?'s':''}</div>
                        <button className="shelf-all" onClick={()=>handleAddClick(lib.type)}>+ Add</button>
                      </div>
                    </>
                  ) : (
                    <div className="shelf-empty" onClick={()=>handleAddClick(lib.type)}>
                      <SmallIcon type="plus" size={14}/>
                      <span>Add your first {LIBRARY_TYPES.find(t=>t.key===lib.type)?.label.toLowerCase()}</span>
                    </div>
                  )}
                </div>
              ))}

              {canCreate && (
                <div className="shelf-row" style={{animationDelay:`${libraries.length*0.07}s`}}>
                  <div className="shelf-icon-block" style={{opacity:.2}}>
                    <ShelfIcon type="plus" size={32}/>
                  </div>
                  <div className="shelf-empty" onClick={()=>user?setShowCreate(true):setShowAuth(true)}>
                    <SmallIcon type="plus" size={14}/>
                    <span>Create a new library</span>
                  </div>
                </div>
              )}
            </div>

            <div className="footer">
              <span className="footer-label">Shelf · Personal media library</span>
              {canCreate && user && <button className="btn-primary" style={{padding:'8px 20px'}} onClick={()=>setShowCreate(true)}>+ New library</button>}
            </div>
          </>
        )}
      </div>

      {showCreate && <CreateModal existing={existing} onClose={()=>setShowCreate(false)} onCreate={handleCreate}/>}
      {showAuth && <AuthModal onClose={()=>setShowAuth(false)} onAuth={handleAuth}/>}
      {addPanel && <AddPanel libType={addPanel} onClose={()=>setAddPanel(null)} onAdd={item=>handleAddItem(addPanel,item)} existingItems={(libraries.find(l=>l.type===addPanel)?.items)||[]}/>}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
