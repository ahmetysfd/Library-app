<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shelf</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --bg:#0a0908;--bg2:#0f0d0a;--bg3:#151210;--bg4:#1a1612;
  --border:#221e18;--border2:#1a1610;--border-hover:#3a3228;
  --gold:#c9a55a;--gold-dim:#7a6038;--gold-faint:rgba(185,150,90,.06);--gold-glow:rgba(200,165,80,.12);
  --text:#ece6da;--text2:#a09888;--text3:#726860;--text4:#524a42;
  --danger:#b04040;--success:#4a8c5c;
  --radius:3px;
}
body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
::selection{background:var(--gold);color:var(--bg)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── Topbar ──────────────────────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 48px 0;position:relative;z-index:10}
.brand{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:opacity .2s}
.brand:hover{opacity:.8}
.topbar-right{display:flex;align-items:center;gap:14px}
.avatar-chip{display:flex;align-items:center;gap:9px;padding:4px 16px 4px 4px;border:0.5px solid var(--border);border-radius:24px;cursor:pointer;transition:border-color .25s,background .25s}
.avatar-chip:hover{border-color:var(--gold-dim);background:var(--gold-faint)}
.avatar-circle{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;color:var(--gold)}
.avatar-name{font-size:13px;letter-spacing:.06em;color:var(--text2)}
.btn-signin{font-family:'Geist',sans-serif;font-size:12px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;padding:10px 24px;background:transparent;border:0.5px solid var(--gold-dim);color:var(--gold);cursor:pointer;border-radius:var(--radius);transition:all .2s}
.btn-signin:hover{background:var(--gold-faint);border-color:var(--gold)}

/* ─── Hamburger Menu + Left Nav Drawer ────────────────────────────────────── */
.hamburger-btn{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:4px;margin-right:14px;opacity:.6;transition:opacity .2s}
.hamburger-btn:hover{opacity:1}
.hamburger-btn span{display:block;width:18px;height:1.5px;background:var(--gold);border-radius:1px;transition:all .2s}
.nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s}
.nav-overlay.open{opacity:1;pointer-events:auto}
.nav-drawer{position:fixed;top:0;left:0;width:260px;height:100vh;background:var(--bg2);border-right:0.5px solid var(--border);z-index:95;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column;overflow-y:auto}
.nav-drawer.open{transform:translateX(0)}
.nav-drawer-header{padding:24px 24px 20px;border-bottom:0.5px solid var(--border)}
.nav-drawer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;letter-spacing:.4em;text-transform:uppercase;color:var(--gold)}
.nav-drawer-section{padding:16px 0}
.nav-drawer-label{font-size:10px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(--text4);padding:0 24px;margin-bottom:8px}
.nav-drawer-item{display:flex;align-items:center;gap:12px;padding:12px 24px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:14px;font-weight:300}
.nav-drawer-item:hover{background:var(--gold-faint);color:var(--text)}
.nav-drawer-item.active{color:var(--gold);background:rgba(200,165,80,.04)}
.nav-drawer-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:.7}
.nav-drawer-item:hover .nav-drawer-icon{opacity:1}
.nav-drawer-divider{height:0.5px;background:var(--border);margin:4px 24px}

/* ─── Steam Integration ──────────────────────────────────────────────────── */
.steam-connect-btn{display:flex;align-items:center;gap:10px;padding:10px 18px;border:0.5px solid #2a4a6a;border-radius:var(--radius);background:rgba(20,40,70,.3);cursor:pointer;transition:all .2s;width:100%;margin-top:6px}
.steam-connect-btn:hover{border-color:#4a7aaa;background:rgba(20,50,90,.4)}
.steam-connect-btn svg{flex-shrink:0}
.steam-connect-btn .steam-label{font-size:13px;font-weight:300;color:#8ab4e0}
.steam-connect-btn .steam-desc{font-size:10px;font-weight:300;color:#5a7a9a;margin-top:1px}
.steam-connect-btn:hover .steam-label{color:#aad0f0}

.steam-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeUp .15s ease}
.steam-modal{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;width:640px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.steam-modal-header{padding:24px 28px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.steam-modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text)}
.steam-modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:4px 8px;transition:color .2s}
.steam-modal-close:hover{color:var(--text)}
.steam-modal-body{padding:20px 28px;overflow-y:auto;flex:1}
.steam-input-row{display:flex;gap:10px;margin-bottom:20px}
.steam-input{flex:1;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;font-weight:300;color:var(--text);outline:none}
.steam-input:focus{border-color:var(--gold-dim)}
.steam-input::placeholder{color:var(--text4)}
.steam-fetch-btn{padding:10px 20px;background:#1a3a5a;border:0.5px solid #2a5a8a;border-radius:var(--radius);color:#8ab4e0;font-family:'Geist',sans-serif;font-size:13px;font-weight:300;cursor:pointer;transition:all .2s;white-space:nowrap}
.steam-fetch-btn:hover{background:#204a6a;border-color:#4a8aba}
.steam-fetch-btn:disabled{opacity:.4;cursor:default}
.steam-game-list{display:flex;flex-direction:column;gap:2px}
.steam-game-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:var(--radius);transition:background .15s;cursor:pointer}
.steam-game-row:hover{background:var(--bg3)}
.steam-game-check{width:16px;height:16px;border:1px solid var(--border);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;color:var(--bg)}
.steam-game-row.selected .steam-game-check{background:var(--gold);border-color:var(--gold)}
.steam-game-cover{width:36px;height:48px;border-radius:2px;overflow:hidden;flex-shrink:0;background:var(--bg3)}
.steam-game-cover img{width:100%;height:100%;object-fit:cover}
.steam-game-info{flex:1;min-width:0}
.steam-game-name{font-size:13px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.steam-game-hours{font-size:11px;font-weight:300;color:var(--text3)}
.steam-game-hours span{color:#6a9aca}
.steam-modal-footer{padding:14px 28px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.steam-import-btn{padding:10px 24px;background:rgba(200,165,80,.1);border:0.5px solid var(--gold-dim);border-radius:var(--radius);color:var(--gold);font-family:'Geist',sans-serif;font-size:13px;font-weight:300;cursor:pointer;transition:all .2s}
.steam-import-btn:hover{background:rgba(200,165,80,.18);border-color:var(--gold)}
.steam-import-btn:disabled{opacity:.3;cursor:default}
.steam-stats{font-size:12px;color:var(--text3);font-weight:300}

/* Playtime badge on game cards */
.card-playtime{font-size:10px;font-weight:300;color:#6a9aca;margin-top:1px;letter-spacing:.02em}

/* ─── API Notice ──────────────────────────────────────────────────────────── */
.api-notice{margin:20px 48px;padding:16px 22px;border:0.5px solid #2a2010;border-radius:var(--radius);background:#120e06;font-size:13px;font-weight:300;color:#8a7040;line-height:1.7;letter-spacing:.02em}
.api-notice strong{color:var(--gold);font-weight:400}
.api-notice a{color:var(--gold);text-decoration:none}
.api-notice a:hover{text-decoration:underline}
.api-notice code{background:#1a1408;padding:2px 6px;border-radius:2px;font-size:12px}

/* ─── Shelves ─────────────────────────────────────────────────────────────── */
.shelves{padding:20px 48px 48px;display:flex;flex-direction:column;gap:20px}
.shelf-row{display:flex;align-items:center;gap:18px;min-height:200px;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ─── Shelf Icon Block (Figma-inspired) ───────────────────────────────────── */
.shelf-icon-block{
  width:120px;height:120px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:0.5px solid var(--border);border-radius:var(--radius);
  background:var(--bg2);position:relative;overflow:hidden;
  cursor:pointer;transition:border-color .3s,box-shadow .4s;
}
.shelf-icon-block:hover{border-color:var(--gold-dim)}
.shelf-icon-block.active{
  border-color:var(--gold-dim);
  box-shadow:0 0 40px rgba(200,165,80,.08),0 0 80px rgba(200,165,80,.04);
}
.shelf-icon-block.active::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(200,165,80,.12) 0%,transparent 70%);
  pointer-events:none;
}
.shelf-icon-block svg{width:56px;height:56px;position:relative;z-index:1}
.shelf-icon-block .icon-inactive{opacity:.45}
.shelf-icon-block .icon-active{opacity:1;filter:drop-shadow(0 0 12px rgba(200,165,80,.3))}

.shelf-empty{flex:1;height:180px;border:0.5px dashed var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;gap:12px;color:var(--text3);font-size:13px;font-weight:300;letter-spacing:.15em;text-transform:uppercase}
.shelf-empty:hover{border-color:var(--gold-dim);background:var(--gold-faint);color:var(--gold)}

.shelf-items{flex:1;display:flex;gap:12px;align-items:flex-end;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;scrollbar-width:none}
.shelf-items::-webkit-scrollbar{display:none}
.shelf-end{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:68px}
.shelf-count{font-size:12px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--text3)}
.shelf-all{font-size:12px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .2s}
.shelf-all:hover{color:var(--gold)}

/* ─── Media Card ──────────────────────────────────────────────────────────── */
.media-card{flex:0 0 auto;cursor:pointer;transition:all .22s}
.media-card:hover{opacity:.85;transform:translateY(-3px)}
.cover-wrap{position:relative;overflow:hidden;border:0.5px solid var(--border);border-radius:var(--radius)}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block;background:var(--bg3)}
.cover-fallback{width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;background:var(--bg3)}
.cover-fallback .f-title{font-family:'Cormorant Garamond',serif;font-size:11px;color:#c9b07a;line-height:1.3}
.book-wrap{border-radius:1px 3px 3px 1px}
.book-wrap::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:#0d0a06;border-right:0.5px solid #1e1a12;z-index:1;pointer-events:none}
.film-wrap{border-radius:var(--radius)}
.game-wrap{border-radius:var(--radius)}
.card-label{font-size:12px;font-weight:300;color:var(--text2);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── Add Panel — Half screen grid overlay ────────────────────────────────── */
.add-panel-back{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:90;display:flex;align-items:stretch;justify-content:center;animation:fade-in .2s ease}
.add-panel{width:100%;max-width:860px;height:100vh;background:var(--bg);display:flex;flex-direction:column;animation:add-panel-in .3s ease;border-left:0.5px solid var(--border);border-right:0.5px solid var(--border)}
@keyframes add-panel-in{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.panel-header{padding:28px 32px 20px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.panel-header-left{display:flex;flex-direction:column;gap:4px}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text)}
.panel-sub{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3)}
.panel-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;padding:8px;transition:color .2s;line-height:1}
.panel-close:hover{color:var(--text)}
.panel-body{flex:1;overflow-y:auto;padding:20px 32px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.panel-footer{padding:16px 32px 24px;border-top:0.5px solid var(--border2)}

.search-row{display:flex;gap:8px;margin-bottom:20px}
.search-field{flex:1;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-family:'Geist',sans-serif;font-size:14px;font-weight:300;color:var(--text);outline:none;transition:border-color .2s}
.search-field:focus{border-color:var(--gold-dim)}
.search-field::placeholder{color:var(--text3)}
.btn-search{padding:12px 18px;background:transparent;border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text3);font-family:'Geist',sans-serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-search:hover{border-color:var(--gold-dim);color:var(--gold)}

.results-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.result-item{display:flex;flex-direction:column;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;transition:all .2s;overflow:hidden;background:var(--bg2)}
.result-item:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.result-item.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(200,165,80,.08)}
.result-thumb{width:100%;aspect-ratio:2/3;overflow:hidden;background:var(--bg3)}
.result-thumb img{width:100%;height:100%;display:block;object-fit:cover}
.result-info{padding:10px 10px 12px;flex:1}
.result-title{font-size:13px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-meta{font-size:11px;font-weight:300;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-check{position:absolute;top:8px;right:8px}
.check-dot{width:20px;height:20px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ─── Rating Modal ────────────────────────────────────────────────────────── */
.rating-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:110;display:flex;align-items:center;justify-content:center;animation:fade-in .15s ease}
.rating-modal{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:32px 36px;width:420px;max-width:calc(100vw - 32px);animation:slide-up .2s ease;text-align:center}
.rating-modal-cover{width:100px;height:150px;border-radius:var(--radius);overflow:hidden;margin:0 auto 16px;border:0.5px solid var(--border)}
.rating-modal-cover img{width:100%;height:100%;object-fit:cover;display:block}
.rating-modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--text);margin-bottom:4px}
.rating-modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.rating-stars-wrap{display:flex;align-items:center;justify-content:center;gap:2px;margin-bottom:12px;cursor:pointer;padding:8px 0;user-select:none}
.rating-star{width:28px;height:28px;position:relative;display:flex;align-items:center;justify-content:center}
.rating-star svg{width:24px;height:24px;transition:transform .1s}
.rating-star:hover svg{transform:scale(1.15)}
.rating-value-display{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:var(--gold);margin-bottom:4px;min-height:44px}
.rating-value-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:20px}

/* Add panel inline rating */
.add-rate-section{padding:16px 0 0}
.add-rate-title{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;text-align:center}
.add-rate-stars{display:flex;align-items:center;justify-content:center;gap:1px;cursor:pointer;padding:4px 0;user-select:none}
.add-rate-stars .rating-star{width:22px;height:22px}
.add-rate-stars .rating-star svg{width:18px;height:18px}
.add-rate-value{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--gold);text-align:center;min-height:30px;margin-top:2px}
.add-rate-skip{font-size:11px;color:var(--text4);text-align:center;margin-top:4px;cursor:pointer;transition:color .2s;letter-spacing:.08em}
.add-rate-skip:hover{color:var(--text2)}
.add-actions-row{display:flex;gap:8px;margin-top:14px}
.btn-watchlist{flex:1;font-family:'Geist',sans-serif;font-size:11px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;padding:11px 16px;border-radius:var(--radius);cursor:pointer;background:transparent;border:0.5px solid var(--border);color:var(--text3);transition:all .2s;white-space:nowrap}
.btn-watchlist:hover{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-faint)}
.btn-add-lib{flex:1;font-family:'Geist',sans-serif;font-size:11px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;padding:11px 16px;border-radius:var(--radius);cursor:pointer;background:transparent;border:0.5px solid var(--gold-dim);color:var(--gold);transition:all .2s;white-space:nowrap}
.btn-add-lib:hover{background:var(--gold-faint);border-color:var(--gold)}

.loading-dots{display:flex;gap:5px;justify-content:center;padding:24px}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:dot 1.2s ease infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}
.no-results{text-align:center;padding:32px;font-size:13px;color:var(--text3);letter-spacing:.1em}

.status-sel{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-family:'Geist',sans-serif;font-size:14px;font-weight:300;color:var(--text);outline:none;margin-bottom:12px;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235a5348' stroke-width='1'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center}
.status-sel option{background:var(--bg)}

/* ─── Modal ───────────────────────────────────────────────────────────────── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:100;animation:fade-in .15s ease}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:40px 44px;width:520px;max-width:calc(100vw - 32px);animation:slide-up .2s ease}
@keyframes slide-up{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:12px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-bottom:28px}

.lib-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.lib-opt{padding:20px 18px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:10px;background:transparent;text-align:left;font-family:inherit}
.lib-opt:hover{border-color:var(--gold-dim);background:var(--gold-faint)}
.lib-opt.selected{border-color:var(--gold);background:var(--gold-faint)}
.lib-opt.disabled{opacity:.25;cursor:not-allowed;pointer-events:none}
.lib-opt svg{width:24px;height:24px}
.opt-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--gold)}
.opt-note{font-size:11px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--text3)}

.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{font-family:'Geist',sans-serif;font-size:12px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;padding:11px 26px;border-radius:var(--radius);cursor:pointer;background:transparent;border:0.5px solid var(--border);color:var(--text3);transition:all .2s}
.btn-cancel:hover{border-color:var(--text3);color:var(--text2)}
.btn-primary{font-family:'Geist',sans-serif;font-size:12px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;padding:11px 26px;border-radius:var(--radius);cursor:pointer;background:transparent;border:0.5px solid var(--gold-dim);color:var(--gold);transition:all .2s}
.btn-primary:hover{background:var(--gold-faint);border-color:var(--gold)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}

/* ─── Auth Modal ──────────────────────────────────────────────────────────── */
.auth-modal{width:420px}
.form-field{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-family:'Geist',sans-serif;font-size:14px;font-weight:300;color:var(--text);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold-dim)}
.form-input::placeholder{color:var(--text4)}
.form-toggle{font-size:13px;font-weight:300;color:var(--text3);margin-top:18px;text-align:center}
.form-toggle span{color:var(--gold);cursor:pointer;transition:opacity .2s}
.form-toggle span:hover{opacity:.7}
.err-msg{font-size:13px;color:var(--danger);margin-bottom:12px;letter-spacing:.04em}

.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:transparent;border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:'Geist',sans-serif;font-size:13px;font-weight:300;letter-spacing:.08em;cursor:pointer;transition:all .2s;margin-bottom:20px}
.google-btn:hover{border-color:var(--border-hover);background:var(--bg3);color:var(--text)}
.google-btn svg{width:18px;height:18px}
.auth-divider{display:flex;align-items:center;gap:16px;margin-bottom:20px;color:var(--text4);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* ─── Toast ───────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 28px;font-size:13px;font-weight:300;letter-spacing:.08em;color:var(--text2);z-index:200;animation:toast-in .25s ease;white-space:nowrap}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* ─── Insights Panel ──────────────────────────────────────────────────────── */
.insights-panel{position:fixed;top:0;right:0;width:672px;height:100vh;background:var(--bg2);border-left:0.5px solid var(--border);display:flex;flex-direction:column;z-index:50;overflow:hidden;transition:transform .3s ease}
.insights-scroll{flex:1;overflow-y:auto;padding:0 0 32px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.insights-scroll::-webkit-scrollbar{width:4px}.insights-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Stats row */
.ins-stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border2);margin:0}
.ins-stat{background:var(--bg2);padding:25px 28px;text-align:center}
.ins-stat-value{font-family:'Cormorant Garamond',serif;font-size:39px;font-weight:400;color:var(--gold);line-height:1}
.ins-stat-label{font-size:13px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-top:8px}

/* Section blocks */
.ins-section{padding:31px 38px 0}
.ins-section-title{font-size:11px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ins-section-title::after{content:'';flex:1;height:0.5px;background:var(--border2)}

/* Horizontal bar chart */
.ins-bars{display:flex;flex-direction:column;gap:10px}
.ins-bar-row{display:flex;align-items:center;gap:10px}
.ins-bar-label{width:80px;font-size:11px;font-weight:300;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.ins-bar-track{flex:1;height:18px;background:var(--bg);border-radius:2px;overflow:hidden;position:relative}
.ins-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.22,.61,.36,1);position:relative}
.ins-bar-fill::after{content:attr(data-count);position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:400;color:var(--bg);letter-spacing:.04em}
.ins-bar-pct{width:32px;font-size:10px;font-weight:300;color:var(--text3);text-align:right;flex-shrink:0}

/* Ring/Donut chart */
.ins-ring-wrap{display:flex;align-items:center;gap:24px;padding:4px 0}
.ins-ring-legend{display:flex;flex-direction:column;gap:6px;flex:1}
.ins-ring-legend-item{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:300;color:var(--text2)}
.ins-ring-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ins-ring-count{margin-left:auto;font-size:11px;color:var(--text3)}

/* People list */
.ins-people{display:flex;flex-direction:column;gap:0}
.ins-person{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:0.5px solid var(--border2)}
.ins-person:last-child{border-bottom:none}
.ins-person-rank{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--text4);width:22px;text-align:center;flex-shrink:0}
.ins-person-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);flex-shrink:0}
.ins-person-info{flex:1;min-width:0}
.ins-person-name{font-size:13px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ins-person-meta{font-size:11px;font-weight:300;color:var(--text3);margin-top:1px}
.ins-person-count{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold-dim);flex-shrink:0}

/* Rating histogram */
.ins-histogram{display:flex;align-items:flex-end;gap:3px;height:64px;padding:0 2px}
.ins-histo-bar{flex:1;background:var(--gold-dim);border-radius:1.5px 1.5px 0 0;transition:height .5s cubic-bezier(.22,.61,.36,1);min-height:2px;position:relative;cursor:default}
.ins-histo-bar:hover{background:var(--gold)}
.ins-histo-bar::after{content:attr(data-label);position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--text4);white-space:nowrap;opacity:0;transition:opacity .15s}
.ins-histo-bar:hover::after{opacity:1}
.ins-histo-labels{display:flex;gap:3px;padding:4px 2px 0}
.ins-histo-labels span{flex:1;text-align:center;font-size:8px;color:var(--text4);letter-spacing:.02em}

/* Empty state */
.ins-empty{padding:48px 38px;text-align:center;color:var(--text3)}
.ins-empty p{font-size:16px;letter-spacing:.06em;margin-top:16px}

/* Top 300 card on insights home */
.ins-top300-card{margin:24px 28px 0;border:0.5px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .25s;background:var(--bg3);position:relative}
.ins-top300-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.ins-top300-bg{height:120px;background:linear-gradient(135deg,#1a160e 0%,#2a2010 50%,#1a1208 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ins-top300-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,rgba(200,165,80,.08),transparent 60%)}
.ins-top300-posters{display:flex;gap:6px;position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);opacity:.3}
.ins-top300-posters div{width:36px;height:54px;background:var(--bg4);border-radius:2px;border:0.5px solid var(--border)}
.ins-top300-number{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:500;color:var(--gold);line-height:1;position:relative;z-index:1;text-shadow:0 2px 20px rgba(200,165,80,.15)}
.ins-top300-body{padding:18px 20px}
.ins-top300-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:4px}
.ins-top300-desc{font-size:12px;font-weight:300;color:var(--text3);line-height:1.5}
.ins-top300-arrow{position:absolute;top:50%;right:20px;transform:translateY(-50%);color:var(--text4);transition:color .2s,transform .2s}
.ins-top300-card:hover .ins-top300-arrow{color:var(--gold);transform:translateY(-50%) translateX(3px)}

/* ─── Top 300 Page ────────────────────────────────────────────────────────── */
.top300-page{padding:0 48px 48px;animation:fadeUp .4s ease}
.top300-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;padding-top:16px}
.top300-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--text)}
.top300-sub{font-size:13px;color:var(--text3);margin-left:12px}
.top300-progress{margin-bottom:24px}
.top300-progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.top300-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s ease}
.top300-progress-text{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text3);letter-spacing:.08em}
.top300-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px}
.top300-item{position:relative;animation:fadeUp .3s ease both;cursor:pointer;transition:transform .2s}
.top300-item:hover{transform:translateY(-3px)}
.top300-rank{position:absolute;top:8px;left:8px;background:rgba(10,9,8,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:0.5px solid rgba(200,165,80,.2);border-radius:4px;padding:3px 8px;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:400;color:var(--gold);z-index:2;line-height:1}
.top300-poster{width:100%;aspect-ratio:2/3;border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);background:var(--bg3)}
.top300-poster img{width:100%;height:100%;object-fit:cover;display:block}
.top300-info{margin-top:8px}
.top300-name{font-size:14px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top300-meta{font-size:12px;font-weight:300;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px}
.top300-rating{display:inline-flex;align-items:center;gap:3px;color:var(--gold);font-size:12px;font-weight:400}
.top300-rating svg{width:12px;height:12px}
.top300-add-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(10,9,8,.85);border:0.5px solid rgba(200,165,80,.3);color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;z-index:3;transition:all .2s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0}
.top300-item:hover .top300-add-btn{opacity:1}
.top300-add-btn:hover{background:rgba(200,165,80,.2);border-color:var(--gold);transform:scale(1.1)}
.top300-added{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(74,140,92,.2);border:0.5px solid rgba(74,140,92,.4);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;z-index:3}
.top300-load-more{display:flex;justify-content:center;padding:32px 0}
.top300-load-btn{font-family:'Geist',sans-serif;font-size:12px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;padding:12px 32px;border-radius:var(--radius);cursor:pointer;background:transparent;border:0.5px solid var(--gold-dim);color:var(--gold);transition:all .2s}
.top300-load-btn:hover{background:var(--gold-faint);border-color:var(--gold)}
.top300-load-btn:disabled{opacity:.3;cursor:not-allowed}

/* Album genre filter tabs */
.album-genre-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.album-genre-tab{padding:7px 16px;border-radius:20px;font-family:'Geist',sans-serif;font-size:12px;font-weight:300;letter-spacing:.06em;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--text3);transition:all .2s;white-space:nowrap}
.album-genre-tab:hover{border-color:var(--gold-dim);color:var(--text2)}
.album-genre-tab.active{border-color:var(--gold);background:rgba(200,165,80,.08);color:var(--gold);font-weight:400}
.album-genre-count{font-size:10px;opacity:.6;margin-left:4px}

/* TMDB genre filter row */
.tmdb-genre-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tmdb-genre-tab{padding:6px 14px;border-radius:20px;font-family:'Geist',sans-serif;font-size:12px;font-weight:300;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--text3);transition:all .2s;white-space:nowrap}
.tmdb-genre-tab:hover{border-color:var(--gold-dim);color:var(--text2)}
.tmdb-genre-tab.active{border-color:var(--gold);background:rgba(200,165,80,.08);color:var(--gold);font-weight:400}

/* Artist browse grid */
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:20px}
.artist-card{text-align:center;animation:fadeUp .3s ease both;cursor:pointer;transition:transform .2s;position:relative}
.artist-card:hover{transform:translateY(-3px)}
.artist-photo{width:120px;height:120px;border-radius:50%;margin:0 auto 10px;overflow:hidden;border:2px solid var(--border);background:var(--bg3);transition:border-color .2s}
.artist-card:hover .artist-photo{border-color:var(--gold-dim)}
.artist-photo img{width:100%;height:100%;object-fit:cover;display:block}
.artist-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--gold-dim);opacity:.4}
.artist-name{font-size:13px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist-meta{font-size:11px;font-weight:300;color:var(--text3);margin-top:3px}
.artist-rank{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:400;color:var(--gold-dim);margin-bottom:2px}
.artist-sort-bar{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.artist-sort-label{font-size:11px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.artist-action-btn{position:absolute;top:18px;right:18px;width:28px;height:28px;border-radius:50%;background:rgba(10,9,8,.9);border:0.5px solid rgba(200,165,80,.35);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;cursor:pointer;z-index:2;opacity:0;transition:all .2s}
.artist-card:hover .artist-action-btn{opacity:1}
.artist-action-btn:hover{background:rgba(200,165,80,.18);border-color:var(--gold)}
.artist-action-added{position:absolute;top:18px;right:18px;width:28px;height:28px;border-radius:50%;background:rgba(74,140,92,.2);border:0.5px solid rgba(74,140,92,.4);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:13px;z-index:2}
.artist-albums-backdrop{position:fixed;inset:0;background:rgba(5,4,3,.72);z-index:1200;display:flex;align-items:flex-start;justify-content:center;padding:42px 18px 18px;overflow:auto}
.artist-albums-modal{width:min(920px,100%);max-height:90vh;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.45)}
.artist-albums-head{display:flex;align-items:flex-start;gap:14px;padding:18px;border-bottom:0.5px solid var(--border2)}
.artist-albums-avatar{width:70px;height:70px;border-radius:10px;overflow:hidden;border:0.5px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold)}
.artist-albums-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.artist-albums-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--text)}
.artist-albums-sub{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:.06em}
.artist-albums-close{margin-left:auto;width:34px;height:34px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer}
.artist-albums-body{padding:18px;overflow:auto}
.artist-albums-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px}
.artist-album-item{position:relative;border:0.5px solid var(--border);background:var(--bg3);border-radius:8px;padding:10px}
.artist-album-cover{width:100%;aspect-ratio:1;border-radius:6px;border:0.5px solid var(--border);overflow:hidden;background:var(--bg2)}
.artist-album-cover img{width:100%;height:100%;object-fit:cover;display:block}
.artist-album-name{font-size:12px;color:var(--text);margin-top:8px;line-height:1.3;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;line-clamp:2;overflow:hidden;min-height:2.6em}
.artist-album-meta{font-size:10px;color:var(--text4);margin-top:4px}
.artist-album-add{position:absolute;top:14px;right:14px;width:25px;height:25px;border-radius:50%;background:rgba(10,9,8,.9);border:0.5px solid rgba(200,165,80,.3);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
.artist-album-added{position:absolute;top:14px;right:14px;width:25px;height:25px;border-radius:50%;background:rgba(74,140,92,.2);border:0.5px solid rgba(74,140,92,.45);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:12px}

/* Year filter bar */
.browse-filters{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.browse-filter-group{display:flex;align-items:center;gap:8px}
.browse-filter-label{font-size:11px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.browse-year-select{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 30px 7px 12px;font-family:'Geist',sans-serif;font-size:13px;font-weight:300;color:var(--text2);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23726860' stroke-width='0.8'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;transition:border-color .2s}
.browse-year-select:hover{border-color:var(--gold-dim)}
.browse-year-select:focus{border-color:var(--gold)}

/* Type counts — Movies / Shows */
.ins-type-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border2)}
.ins-type-cell{background:var(--bg2);padding:28px 20px;text-align:center;position:relative}
.ins-type-value{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:400;color:var(--gold);line-height:1}
.ins-type-label{font-size:11px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;color:var(--text4);margin-top:8px}
.ins-type-cell::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

/* Directors — 2×2 grid of cards */
.ins-directors{padding:24px 28px 0}
.ins-directors-title{font-size:11px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ins-directors-title svg{width:14px;height:14px;opacity:.5}
.ins-directors-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ins-dir-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;padding:16px 14px 14px;display:flex;flex-direction:column;animation:fadeUp .4s ease both;transition:border-color .2s}
.ins-dir-card:hover{border-color:var(--border-hover)}
.ins-dir-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.ins-dir-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.ins-dir-count{font-size:11px;font-weight:300;color:var(--text2);flex-shrink:0;margin-left:6px;white-space:nowrap}
.ins-dir-films{display:flex;gap:6px;overflow:hidden}
.ins-dir-film-thumb{flex:0 0 auto;width:52px;display:flex;flex-direction:column;align-items:center;gap:4px}

/* ─── Card menu button ─────────────────────────────────────────────────────── */
.card-dots-btn{

.card-dots-btn:active{background:var(--border)}
.card-dots-btn svg{display:block;pointer-events:none}

/* ─── Card dropdown — rendered in portal so z-index always wins ───────────── */
.card-dropdown{
  background:var(--bg2);
  border:0.5px solid var(--border);

  min-width:192px;

}

}
.quick-add-opt:hover{background:var(--bg3);color:var(--text)}
.quick-add-opt svg{flex-shrink:0;opacity:.7}

.quick-add-sep{height:0.5px;background:var(--border2)}
.status-collected{background:rgba(10,9,8,.7);color:var(--text2);border:0.5px solid var(--border)}
.status-in_progress{background:rgba(74,140,92,.15);color:var(--success);border:0.5px solid rgba(74,140,92,.3)}
.status-wishlist{background:rgba(200,165,80,.1);color:var(--gold);border:0.5px solid rgba(200,165,80,.2)}

.cw-section{margin-bottom:32px}
.cw-section-header{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid var(--border2)}

.cw-card{flex:0 0 auto;width:130px}

.cw-card-info-left{flex:1;min-width:0;cursor:pointer}
.cw-card-title{font-size:13px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* sort bar */

/* Watchlist sub-filter buttons */

.wl-filter-btn:hover{border-color:var(--gold-dim);color:var(--text)}

.lib-view-btn.active{border-color:var(--gold-dim);color:var(--gold)}
.lib-view-btn:hover{border-color:var(--gold-dim);color:var(--gold)}

/* list view */
.lib-list{display:flex;flex-direction:column;gap:1px}
.lib-list-item{display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;transition:all .2s}
.lib-list-item:hover{border-color:var(--border);background:var(--bg3)}

.lib-list-thumb img{width:100%;height:100%;object-fit:cover}

.lib-list-status{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.lib-list-delete{background:none;border:none;color:var(--text4);cursor:pointer;padding:6px;transition:color .2s;font-size:16px;line-height:1}

/* ─── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:1400px){
  .insights-panel{width:560px}
  .main-content{padding-right:560px}

}

  .shelf-icon-block{width:80px;height:80px}

  .lib-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px}
  .add-panel{width:100%}
}

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   CONFIGURATION — Replace with your own keys
   ═══════════════════════════════════════════════════════════════════════════ */
const API_BASE = 'http://localhost:3001'; // Your Express server URL

// Direct client-side keys (for demo/local — in production, use server proxy)
const TMDB_KEY  = 'bf94a83bd4f8d19b63e33ffaa6129e27';
const TMDB_IMG  = 'https://image.tmdb.org/t/p/w185';
const TMDB_BASE = 'https://api.themoviedb.org/3';

const LIBRARY_TYPES = [
  { key:'films',  label:'Films & TV', icon:'film',  w:116, h:172 },
  { key:'books',  label:'Books',      icon:'book',  w:124, h:180 },
  { key:'music',  label:'Music',      icon:'music', w:152, h:152 },
  { key:'games',  label:'Games',      icon:'game',  w:132, h:176 },
];

/* ═══════════════════════════════════════════════════════════════════════════
   DATABASE LAYER — localStorage for offline, API calls when server available
   ═══════════════════════════════════════════════════════════════════════════ */
const DB = {
  _token: null,
  _serverUp: null,

  async checkServer() {
    if (this._serverUp !== null) return this._serverUp;
    try {
      const r = await fetch(API_BASE + '/api/libraries', { 
        method: 'GET',
        headers: this._token ? { 'Authorization': 'Bearer ' + this._token } : {},
        signal: AbortSignal.timeout(2000) 
      });
      this._serverUp = true;
    } catch { this._serverUp = false; }
    return this._serverUp;
  },

  setToken(t) { this._token = t; if(t) localStorage.setItem('shelf_token',t); else localStorage.removeItem('shelf_token'); },
  getToken() { return this._token || localStorage.getItem('shelf_token'); },

  // Local storage fallback
  _getLocal(k) { try { return JSON.parse(localStorage.getItem('shelf_'+k)) } catch { return null } },
  _setLocal(k,v) { localStorage.setItem('shelf_'+k, JSON.stringify(v)) },

  async register(username, email, password) {
    const serverUp = await this.checkServer();
    if (serverUp) {
      const r = await fetch(API_BASE+'/api/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username,email,password})
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error||'Registration failed');
      this.setToken(d.token);
      this._setLocal('user', d.user);
      return d.user;
    }
    // Offline mode
    const user = { id:'local-'+Date.now(), username, email };
    this._setLocal('user', user);
    return user;
  },

  async login(email, password) {
    const serverUp = await this.checkServer();
    if (serverUp) {
      const r = await fetch(API_BASE+'/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email,password})
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error||'Login failed');
      this.setToken(d.token);
      this._setLocal('user', d.user);
      return d.user;
    }
    const user = this._getLocal('user');
    if (user && user.email === email) return user;
    throw new Error('Offline mode — user not found locally');
  },

  async googleAuth() {
    // In production, this would use Supabase Auth or your own OAuth flow
    // For now, simulate Google sign-in
    const name = 'Google User';
    const user = { id:'google-'+Date.now(), username:name.toLowerCase().replace(/\s/g,'_'), email:name.toLowerCase().replace(/\s/g,'.')+'@gmail.com', display_name:name };
    this._setLocal('user', user);
    return user;
  },

  getLocalUser() {
    return this._getLocal('user');
  },

  logout() {
    this.setToken(null);
    localStorage.removeItem('shelf_user');
  },

  async getLibraries(userId) {
    const t = this.getToken();
    if (t) {
      try {
        const r = await fetch(API_BASE+'/api/libraries', { headers:{'Authorization':'Bearer '+t} });
        if (r.ok) { const d = await r.json(); return d; }
      } catch {}
    }
    return this._getLocal('libraries') || [];
  },

  async createLibrary(type) {
    const t = this.getToken();
    if (t) {
      try {
        const r = await fetch(API_BASE+'/api/libraries', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},
          body: JSON.stringify({type})
        });
        if (r.ok) return await r.json();
      } catch {}
    }
    const libs = this._getLocal('libraries') || [];
    const lib = { id:'lib-'+Date.now(), type, items:[], created_at:new Date().toISOString() };
    libs.push(lib);
    this._setLocal('libraries', libs);
    return lib;
  },

  async addItem(libraryId, item) {
    const t = this.getToken();
    if (t) {
      try {
        const r = await fetch(API_BASE+'/api/libraries/'+libraryId+'/items', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},
          body: JSON.stringify(item)
        });
        if (r.ok) return await r.json();
      } catch {}
    }
    const libs = this._getLocal('libraries') || [];
    const lib = libs.find(l=>l.id===libraryId);
    if (lib) {
      const newItem = { id:'item-'+Date.now(), ...item, created_at:new Date().toISOString() };
      lib.items = [newItem, ...(lib.items||[])];
      this._setLocal('libraries', libs);
      return newItem;
    }
  },

  async removeItem(libraryId, itemId) {
    const t = this.getToken();
    if (t) {
      try {
        await fetch(API_BASE+'/api/libraries/'+libraryId+'/items/'+itemId, {
          method:'DELETE', headers:{'Authorization':'Bearer '+t}
        });
      } catch {}
    }
    const libs = this._getLocal('libraries') || [];
    const lib = libs.find(l=>l.id===libraryId);
    if (lib) {
      lib.items = (lib.items||[]).filter(i=>i.id!==itemId);
      this._setLocal('libraries', libs);
    }
  },

  async searchUsers(q) {
    const t = this.getToken();
    if (t) {
      try {
        const r = await fetch(API_BASE+'/api/search?q='+encodeURIComponent(q), { headers:{'Authorization':'Bearer '+t} });
        if (r.ok) { const d = await r.json(); return d.users||[]; }
      } catch {}
    }
    return [];
  },

  async followUser(userId) {
    const t = this.getToken();
    if (t) {
      try {
        await fetch(API_BASE+'/api/users/'+userId+'/follow', {
          method:'POST', headers:{'Authorization':'Bearer '+t}
        });
      } catch {}
    }
    const friends = this._getLocal('friends') || [];
    if (!friends.find(f=>f.id===userId)) {
      friends.push({ id:userId, username:'user_'+userId.slice(-4) });
      this._setLocal('friends', friends);
    }
  },

  getFriends() {
    return this._getLocal('friends') || [];
  }
};

/* ─── Card 3-Dot Dropdown Menu ────────────────────────────────────────────── */
/* ─── Card Context Menu ───────────────────────────────────────────────────── */
function CardMenu({ item, onRemove, onMoveToWatchlist, onMarkWatching, onMarkWatched }) {
  const [open, setOpen] = useState(false);
  const [dropStyle, setDropStyle] = useState({});
  const btnRef = useRef();
  const dropRef = useRef();

  // Close on outside click or scroll
  useEffect(()=>{
    if (!open) return;
    const close = (e)=>{
      if (btnRef.current?.contains(e.target)) return;
      if (dropRef.current?.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', close);
    document.addEventListener('scroll', ()=>setOpen(false), { capture:true, once:true });
    return ()=>document.removeEventListener('mousedown', close);
  },[open]);

  const handleOpen = (e)=>{
    e.stopPropagation();
    if (open) { setOpen(false); return; }
    const r = btnRef.current.getBoundingClientRect();
    const dropW = 196;
    const dropH = 92;  // approx: two items + separator
    const spaceBelow = window.innerHeight - r.bottom - 8;
    const openUpward = spaceBelow < dropH;
    // Prefer opening to the right edge of the button; flip left if near right edge
    const rightEdge = window.innerWidth - r.right;
    setDropStyle({
      position: 'fixed',
      top: openUpward ? r.top - dropH - 4 : r.bottom + 4,
      right: rightEdge < dropW ? window.innerWidth - r.left - dropW : rightEdge - (dropW - r.width),
      width: dropW,
      zIndex: 9999,
    });
    setOpen(true);
  };

  const isWishlist = item.status === 'wishlist';

  const MoveIcon = ()=> isWishlist ? (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7h10M7 2v5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
      <circle cx="7" cy="11" r="1.2" fill="currentColor"/>
    </svg>
  ) : (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="7" cy="7" r="5" stroke="currentColor" strokeWidth="1.1"/>
      <path d="M7 4.5V7l2 1.5" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  const TrashIcon = ()=>(
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 4h10M5 4V3a1 1 0 011-1h2a1 1 0 011 1v1M11 4l-.7 7A1 1 0 019.3 12H4.7a1 1 0 01-1-.9L3 4" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  // Eye icon — "Currently Watching"
  const EyeIcon = ()=>(
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <ellipse cx="7" cy="7" rx="5.5" ry="3.5" stroke="currentColor" strokeWidth="1.1"/>
      <circle cx="7" cy="7" r="1.6" fill="currentColor"/>
    </svg>
  );

  // Check icon — "Mark as Watched"
  const WatchedIcon = ()=>(
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7l3.5 3.5 6.5-6.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  return (
    <>
      <button ref={btnRef} className="card-dots-btn" onClick={handleOpen} title="Options">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="2.5" r="1.1" fill="currentColor"/>
          <circle cx="7" cy="7"   r="1.1" fill="currentColor"/>
          <circle cx="7" cy="11.5" r="1.1" fill="currentColor"/>
        </svg>
      </button>

      {open && ReactDOM.createPortal(
        <div ref={dropRef} className="card-dropdown" style={dropStyle}>
          {onMarkWatching && (
            <>
              <button className="card-dropdown-item" onClick={(e)=>{e.stopPropagation();onMarkWatching(item);setOpen(false);}}>
                <EyeIcon/> Currently Watching
              </button>
              <div className="card-dropdown-sep"/>
            </>
          )}
          {onMarkWatched && (
            <>
              <button className="card-dropdown-item" onClick={(e)=>{e.stopPropagation();onMarkWatched(item);setOpen(false);}}>
                <WatchedIcon/> Mark as Watched
              </button>
              <div className="card-dropdown-sep"/>
            </>
          )}
          <button className="card-dropdown-item" onClick={(e)=>{e.stopPropagation();onMoveToWatchlist(item);setOpen(false);}}>
            <MoveIcon/>
            {isWishlist ? 'Move to collected' : 'Move to watchlist'}
          </button>
          <div className="card-dropdown-sep"/>
          <button className="card-dropdown-item danger" onClick={(e)=>{e.stopPropagation();onRemove(item);setOpen(false);}}>
            <TrashIcon/>
            Remove from library
          </button>
        </div>,
        document.body
      )}
    </>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   API SEARCH FUNCTIONS
   ═══════════════════════════════════════════════════════════════════════════ */
async function apiFilms(q) {
  if (location.protocol === 'file:' || !TMDB_KEY) return demoFilms(q);
  try {
    const r = await fetch(`${TMDB_BASE}/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&include_adult=false`);
    const d = await r.json();
    if (!r.ok) return demoFilms(q);
    return (d.results||[]).filter(x=>x.poster_path).slice(0,16).map(x=>({
      ext_id:String(x.id), title:x.title||x.name,
      subtitle:(x.release_date||x.first_air_date||'').slice(0,4),
      cover_url:TMDB_IMG+x.poster_path,
      metadata:{media_type:x.media_type, vote_average:x.vote_average}
    }));
  } catch { return demoFilms(q); }
}

async function apiBooks(q) {
  try {
    const r = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=16&fields=key,title,author_name,cover_i,first_publish_year`);
    const d = await r.json();
    return (d.docs||[]).filter(x=>x.cover_i).slice(0,16).map(x=>({
      ext_id:x.key, title:x.title,
      subtitle:(x.author_name||[])[0]||'',
      cover_url:`https://covers.openlibrary.org/b/id/${x.cover_i}-M.jpg`,
      metadata:{year:x.first_publish_year}
    }));
  } catch { return []; }
}

async function apiMusic(q) {
  try {
    const r = await fetch(
      `https://musicbrainz.org/ws/2/release/?query=release:${encodeURIComponent(q)}&limit=16&fmt=json`,
      { headers:{'User-Agent':'ShelfApp/1.0 (https://shelf.app)'} }
    );
    const d = await r.json();
    return (d.releases||[]).slice(0,16).map(rel=>({
      ext_id:rel.id, title:rel.title,
      subtitle:(rel['artist-credit']||[]).map(a=>a.name||a?.artist?.name).filter(Boolean).join(', '),
      cover_url:`https://coverartarchive.org/release/${rel.id}/front-250`,
      metadata:{date:rel.date}
    }));
  } catch { return []; }
}

/* ─── Cover Image ─────────────────────────────────────────────────────────── */
function Cover({ src, alt, w, h, cls, style }) {
  const [err,setErr] = useState(false);
  return (
    <div className={`cover-wrap ${cls||''}`} style={{width:w,height:h,...style}}>
      {src&&!err

    </div>

}

/* ─── Media Card ──────────────────────────────────────────────────────────── */
function MediaCard({ libType, item, onClick }) {
  const def = LIBRARY_TYPES.find(t=>t.key===libType);
  const lbl = item.title?.length>16 ? item.title.slice(0,15)+'…' : item.title;

/* ─── Add Item Panel — Half-screen grid ───────────────────────────────────── */
function AddPanel({ libType, onClose, onAdd, existingItems }) {
  const def = LIBRARY_TYPES.find(t=>t.key===libType);
  const searchFns = { films:apiFilms, books:apiBooks, music:apiMusic, games:apiGames };
  const [q,setQ] = useState('');
  const [results,setResults] = useState([]);
  const [loading,setLoading] = useState(false);
  const [sel,setSel] = useState(null);
  const [addRating,setAddRating] = useState(0);
  const [addRatingHover,setAddRatingHover] = useState(null);
  const [quickAddOpen, setQuickAddOpen] = useState(null); // ext_id of item with open popup
  const inputRef = useRef();

  // Close quick-add popup on outside click
  useEffect(()=>{
    if (!quickAddOpen) return;
    const handler = ()=> setQuickAddOpen(null);
    document.addEventListener('mousedown', handler);
    return ()=> document.removeEventListener('mousedown', handler);
  }, [quickAddOpen]);

  useEffect(()=>{
    inputRef.current?.focus();
    setLoading(true);
    const defaults={films:'popular',books:'fiction',music:'classic',games:'adventure'};
    searchFns[libType](defaults[libType]).then(r=>{setResults(r);setLoading(false);}).catch(()=>setLoading(false));
  },[libType]);

  const doSearch = async()=>{
    if(!q.trim())return;
    setLoading(true);setSel(null);setResults([]);setAddRating(0);
    try{const r=await searchFns[libType](q);setResults(r);}catch{setResults([]);}
    setLoading(false);
  };

  const getValFromEvent = (e, starIndex) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const fraction = Math.max(0, Math.min(1, x / rect.width));
    return Math.round((starIndex + fraction) * 10) / 10;
  };

  const ratingDisplay = addRatingHover !== null ? addRatingHover : addRating;

  const handleAdd = (status) => {
    onAdd({...sel, status, user_rating: addRating || undefined});
    onClose();
  };

  const progressLabel = {films:'Watching',books:'Reading',music:'Listening',games:'Playing'}[libType] || 'In progress';
  const watchlistLabel = {films:'Watchlist',books:'Reading list',music:'Listen later',games:'Backlog'}[libType] || 'Watchlist';

  return (
    <div className="add-panel-back" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="add-panel">
        <div className="panel-header">
          <div className="panel-header-left">
            <div className="panel-title">Add to {def.label}</div>
            <div className="panel-sub">Search · Select · Rate · Save</div>
          </div>
          <button className="panel-close" onClick={onClose}>×</button>
        </div>
        <div className="panel-body">
          <div className="search-row">
            <input ref={inputRef} className="search-field" value={q}
              placeholder={`Search ${def.label.toLowerCase()}…`}
              onChange={e=>setQ(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doSearch()} />
            <button className="btn-search" onClick={doSearch}>Search</button>
          </div>
          {loading && <div className="loading-dots"><span/><span/><span/></div>}
          {!loading&&results.length===0&&q && <div className="no-results">No results found</div>}
          <div className="results-list">
            {results.map(item=>{
              const alreadyAdded = (existingItems||[]).some(i=>i.ext_id&&i.ext_id===item.ext_id);
              const isPopupOpen = quickAddOpen === item.ext_id;
              return (
                <div key={item.ext_id} className={`result-item ${sel?.ext_id===item.ext_id?'selected':''}`}
                  onClick={()=>{if(alreadyAdded)return;setQuickAddOpen(null);setSel(s=>s?.ext_id===item.ext_id?null:item);setAddRating(0);setAddRatingHover(null);}}
                  style={{position:'relative',opacity:alreadyAdded?.6:1,cursor:alreadyAdded?'default':'pointer'}}>
                  <div className="result-thumb" style={{position:'relative'}}>
                    <img src={item.cover_url} alt={item.title}
                      onError={e=>{e.target.style.visibility='hidden';}}/>
                    {!alreadyAdded && (
                      <div onMouseDown={e=>e.stopPropagation()}>
                        <button
                          className="result-plus-btn"
                          title="Add…"
                          onClick={(e)=>{e.stopPropagation();setQuickAddOpen(isPopupOpen?null:item.ext_id);}}>
                          {isPopupOpen
                            ? <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
                            : <span style={{fontSize:'16px',lineHeight:1}}>+</span>}
                        </button>
                        {isPopupOpen && (
                          <div className="quick-add-popup" onMouseDown={e=>e.stopPropagation()}>
                            {/* Currently Watching — only for TV shows */}
                            {item.metadata?.media_type==='tv' && (
                              <>
                                <button className="quick-add-opt" onClick={(e)=>{e.stopPropagation();onAdd({...item,status:'in_progress'});setQuickAddOpen(null);}}>
                                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                                    <ellipse cx="6.5" cy="6.5" rx="5.5" ry="3.5" stroke="var(--success)" strokeWidth="1.1"/>
                                    <circle cx="6.5" cy="6.5" r="1.7" fill="var(--success)"/>
                                  </svg>
                                  Currently Watching
                                </button>
                                <div className="quick-add-sep"/>
                              </>
                            )}
                            {/* Watched / Collected */}
                            <button className="quick-add-opt" onClick={(e)=>{e.stopPropagation();onAdd({...item,status:'collected'});setQuickAddOpen(null);}}>
                              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">

                              </svg>

                            <button className="quick-add-opt" onClick={(e)=>{e.stopPropagation();onAdd({...item,status:'wishlist'});setQuickAddOpen(null);}}>
                              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                                <ellipse cx="6.5" cy="6.5" rx="5.5" ry="3.5" stroke="currentColor" strokeWidth="1.1"/>
                                <circle cx="6.5" cy="6.5" r="1.5" fill="currentColor"/>
                              </svg>
                              Watchlist
                            </button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                  <div className="result-info">
                    <div className="result-title">{item.title}</div>
                    <div className="result-meta">{item.subtitle}</div>
                    {alreadyAdded && (
                      <div style={{fontSize:'10px',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--gold)',marginTop:4,display:'flex',alignItems:'center',gap:4}}>
                        <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        In library
                      </div>
                    )}
                  </div>
                  {sel?.ext_id===item.ext_id&&<div className="result-check"><div className="check-dot"><SmallIcon type="check" size={10}/></div></div>}
                </div>
              );
            })}
          </div>
        </div>
        {sel&&(
          <div className="panel-footer">
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <img src={sel.cover_url} alt={sel.title} style={{width:36,height:54,objectFit:'cover',borderRadius:'2px',border:'0.5px solid var(--border)'}} onError={e=>{e.target.style.display='none'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'14px',fontWeight:400,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sel.title}</div>
                <div style={{fontSize:'12px',color:'var(--text3)',marginTop:2}}>{sel.subtitle}</div>
              </div>
            </div>
            <div className="add-rate-section">
              <div className="add-rate-title">Rate it</div>
              <div className="add-rate-stars" onMouseLeave={()=>setAddRatingHover(null)}>
                {Array.from({length:10},(_,i)=>{
                  const fillAmt = Math.max(0, Math.min(1, (ratingDisplay||0) - i));
                  return (
                    <div key={i} className="rating-star"
                      onMouseMove={e=>setAddRatingHover(getValFromEvent(e,i))}
                      onClick={e=>{e.stopPropagation();setAddRating(getValFromEvent(e,i));}}>
                      <svg viewBox="0 0 24 24" fill="none">
                        <defs><linearGradient id={`af${i}`}><stop offset={`${fillAmt*100}%`} stopColor="#c9a55a"/><stop offset={`${fillAmt*100}%`} stopColor="transparent"/></linearGradient></defs>
                        <path d="M12 2l2.9 5.8 6.5.9-4.7 4.6 1.1 6.4L12 16.8 6.2 19.7l1.1-6.4L2.6 8.7l6.5-.9z"
                          fill={`url(#af${i})`} stroke="#c9a55a" strokeWidth="1" strokeLinejoin="round"/>
                      </svg>

                  );
                })}
              </div>
              <div className="add-rate-value">{ratingDisplay ? ratingDisplay.toFixed(1) : ''}</div>
              {addRating > 0 && <div className="add-rate-skip" onClick={()=>setAddRating(0)}>Clear rating</div>}
            </div>
            <div className="add-actions-row">
              <button className="btn-watchlist" onClick={()=>handleAdd('wishlist')}>
                + {watchlistLabel}

        )}
      </div>
    </div>
  );
}

/* ─── Auth Modal ──────────────────────────────────────────────────────────── */
function AuthModal({ onClose, onAuth }) {
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({username:'',email:'',password:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const submit = async (e)=>{
    e.preventDefault();setErr('');
    if(mode==='register'&&form.username.length<2) return setErr('Username must be at least 2 characters');
    if(!form.email.includes('@')) return setErr('Enter a valid email');
    if(form.password.length<6) return setErr('Password must be 6+ characters');
    setLoading(true);
    try {
      let user;
      if(mode==='register') user = await DB.register(form.username, form.email, form.password);
      else user = await DB.login(form.email, form.password);
      onAuth(user);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const googleLogin = async ()=>{
    setLoading(true);
    try {
      const user = await DB.googleAuth();
      onAuth(user);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal auth-modal">
        <div className="modal-title">{mode==='login'?'Sign in':'Create account'}</div>
        <div className="modal-sub">{mode==='login'?'Access your collection':'Start building your library'}</div>

        <button className="google-btn" onClick={googleLogin} disabled={loading}>
          <GoogleIcon/>
          Continue with Google
        </button>
        <div className="auth-divider">or</div>

        {err&&<div className="err-msg">{err}</div>}
        <form onSubmit={submit}>
          {mode==='register'&&(
            <div className="form-field">
              <label className="form-label">Username</label>
              <input className="form-input" placeholder="your_handle" value={form.username} onChange={e=>setForm({...form,username:e.target.value})}/>
            </div>
          )}
          <div className="form-field">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          </div>
          <div className="form-field">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
          </div>
          <div className="modal-actions" style={{marginTop:20}}>
            <button type="button" className="btn-cancel" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn-primary" disabled={loading}>{loading?'…':mode==='login'?'Sign in':'Create account'}</button>
          </div>
        </form>
        <div className="form-toggle">
          {mode==='login'
            ?<>No account? <span onClick={()=>{setMode('register');setErr('');}}>Sign up</span></>
            :<>Have an account? <span onClick={()=>{setMode('login');setErr('');}}>Sign in</span></>}
        </div>
      </div>
    </div>
  );
}

/* ─── Star Rating Component ───────────────────────────────────────────────── */
function StarRating({ value, onChange }) {
  const starsRef = useRef(null);
  const [hoverVal, setHoverVal] = useState(null);

  const getValFromEvent = (e, starIndex) => {
    const starEl = e.currentTarget;
    const rect = starEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const fraction = Math.max(0, Math.min(1, x / rect.width));
    // Round to nearest 0.1
    const raw = starIndex + fraction;
    return Math.round(raw * 10) / 10;
  };

  const displayVal = hoverVal !== null ? hoverVal : value;
  const displayNum = displayVal ? displayVal.toFixed(1) : '—';

  return (
    <>
      <div className="rating-value-display">{displayNum}</div>
      <div className="rating-value-label">{displayVal ? `${displayNum} out of 10` : 'Click a star to rate'}</div>
      <div className="rating-stars-wrap" ref={starsRef} onMouseLeave={()=>setHoverVal(null)}>
        {Array.from({length:10},(_, i)=>{
          const fillAmount = Math.max(0, Math.min(1, (displayVal||0) - i));
          return (
            <div key={i} className="rating-star"
              onMouseMove={e=>setHoverVal(getValFromEvent(e,i))}
              onClick={e=>onChange(getValFromEvent(e,i))}>
              <svg viewBox="0 0 24 24" fill="none">
                <defs>
                  <linearGradient id={`sf${i}`}>
                    <stop offset={`${fillAmount*100}%`} stopColor="#c9a55a"/>
                    <stop offset={`${fillAmount*100}%`} stopColor="transparent"/>
                  </linearGradient>
                </defs>
                <path d="M12 2l2.9 5.8 6.5.9-4.7 4.6 1.1 6.4L12 16.8 6.2 19.7l1.1-6.4L2.6 8.7l6.5-.9z"
                  fill={`url(#sf${i})`} stroke="#c9a55a" strokeWidth="1" strokeLinejoin="round"/>
              </svg>
            </div>
          );
        })}
      </div>
    </>
  );
}

/* ─── Library Detail Page ─────────────────────────────────────────────────── */
function LibraryPage({ library, onBack, onAddClick, onRemoveItem, onRateItem, onMoveStatus }) {
  const def = LIBRARY_TYPES.find(t=>t.key===library.type);
  const isFilms = library.type === 'films';
  const [tab,setTab] = useState(isFilms ? 'movies' : 'all');
  const [viewMode,setViewMode] = useState('grid');
  const [sortBy,setSortBy] = useState('user_rating');
  const [ratingItem,setRatingItem] = useState(null);
  const [watchlistFilter,setWatchlistFilter] = useState('all'); // 'all' | 'movies' | 'shows'
  const [libSearch,setLibSearch] = useState('');
  const [showSearch,setShowSearch] = useState(false);
  const searchInputRef = useRef(null);
  /* Films: header search opens Add panel (TMDB) — not local library filter */
  const sortStorageKey = `shelf_sortby_${library.type}`;

  useEffect(()=>{
    const saved = localStorage.getItem(sortStorageKey);
    setSortBy(saved || 'user_rating');
  },[sortStorageKey]);

  useEffect(()=>{
    localStorage.setItem(sortStorageKey, sortBy);
  },[sortStorageKey, sortBy]);

  useEffect(()=>{
    if (showSearch) searchInputRef.current?.focus();
  },[showSearch]);

  const getDisplayRating = (item)=>{
    if (item.user_rating) return { value: item.user_rating.toFixed(1), empty: false };
    if (sortBy === 'user_rating') return { value: '', empty: true };
    const globalVal = item.metadata?.vote_average || item.metadata?.rating;
    if (globalVal || globalVal===0) return {
      value: globalVal?.toFixed?.(1) || globalVal,
      empty: false
    };
    return { value: '', empty: true };
  };

  // Films: Movies / Shows / Watchlist  (Watching removed — lives inside Shows)
  // Music: Albums / Artists (no watchlist)
  // Others: All / In Progress / Watchlist
  const isMusic = library.type === 'music';
  const isMusicArtistItem = (i) => i?.metadata?.kind === 'artist';
  const filmTabs = [
    { key:'movies', label:'Movies' },
    { key:'shows',  label:'Shows'  },
    { key:'wishlist', label:'Watchlist' },
  ];
  const musicTabs = [
    { key:'all', label:'Albums' },
    { key:'artists', label:'Artists' },
  ];
  const genericTabs = [
    { key:'all', label:'All' },
    { key:'in_progress', label:({books:'Reading',games:'Playing'})[library.type]||'In progress' },
    { key:'wishlist', label:'Watchlist' },
  ];
  const tabs = isFilms ? filmTabs : isMusic ? musicTabs : genericTabs;

  // Currently Watching = TV shows marked in_progress; shown as a section inside Shows tab
  const currentlyWatchingShows = useMemo(()=>
    (library.items||[]).filter(i=>{
      if (!(i.metadata?.media_type==='tv' && i.status==='in_progress')) return false;

        filtered = filtered.filter(i=>i.status==='wishlist');
        if (watchlistFilter==='movies') filtered = filtered.filter(i=>i.metadata?.media_type!=='tv');
        if (watchlistFilter==='shows')  filtered = filtered.filter(i=>i.metadata?.media_type==='tv');
      }

    if (sortBy==='user_rating') filtered.sort((a,b)=>(b.user_rating||0)-(a.user_rating||0));
    if (sortBy==='followers')   filtered.sort((a,b)=>(b.metadata?.followers||0)-(a.metadata?.followers||0));

                <div className="lib-list-title">{item.title}</div>
                <div className="lib-list-sub">

              </div>
              <div className="lib-list-right">
                {(()=>{
                  const rating = getDisplayRating(item);
                  return (
                    <span className="lib-grid-card-rating">
                      <SmallIcon type={rating.empty ? "star-outline" : "star"} size={14}/>
                      {rating.value}
                    </span>

                })()}
                <span className="lib-list-status">{statusLabel[item.status]}</span>
                <CardMenu
